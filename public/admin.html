<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .login-box {
            max-width: 360px;
            margin: 10vh auto;
            padding: 2rem;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--color-text);
        }
        .login-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 0.8rem;
            background: var(--color-primary);
            color: var(--color-text-inverse);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            cursor: pointer;
        }
        .login-box button:hover { background: var(--color-primary-hover); }
        .error-msg {
            color: var(--color-danger);
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .hidden { display: none !important; }
        /* Tab 切换 */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--color-border);
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.7rem 1.5rem;
            border: none;
            background: none;
            font-size: var(--text-base);
            cursor: pointer;
            color: var(--color-text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            font-weight: 600;
        }
        /* 设置面板 */
        .settings-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .settings-panel { grid-template-columns: 1fr; }
        }
        .settings-form {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .settings-form h3 {
            margin-bottom: 1.2rem;
            color: var(--color-text);
        }
        .preview-box {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .preview-box h3 {
            margin-bottom: 1rem;
            color: var(--color-text);
        }
        .preview-area {
            background: var(--color-bg);
            border-radius: 10px;
            padding: 2rem 1.5rem;
            text-align: center;
            min-height: 200px;
        }
        .preview-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .preview-subtitle {
            color: var(--color-text-placeholder);
            font-size: var(--text-base);
            margin-bottom: 2rem;
        }
        .preview-cards {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .preview-card {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            padding: 1.2rem 1rem;
            box-shadow: var(--shadow-sm);
            width: 140px;
        }
        .preview-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-border);
            margin: 0 auto 0.6rem;
        }
        .preview-card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text);
        }
        .preview-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--color-text-placeholder);
            font-size: 0.85rem;
        }
        .save-hint {
            margin-top: 1rem;
            padding: 0.7rem;
            background: var(--color-success-bg);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--color-success-text);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-hint.show { opacity: 1; }
        .md-btn {
            padding: 0.25rem 0.5rem; border: 1px solid var(--color-border);
            background: var(--color-bg); color: var(--color-text-secondary);
            border-radius: 4px; cursor: pointer; font-size: 0.78rem;
            font-weight: 600; transition: all 0.15s;
            -webkit-user-select: none; user-select: none;
        }
        .md-btn:hover { background: var(--color-primary-light); border-color: var(--color-primary); color: var(--color-primary); }
        .md-btn:active { transform: scale(0.95); background: var(--color-primary-light); border-color: var(--color-primary); }
        .md-upload { display: inline-flex; align-items: center; gap: 0.2rem; }
        /* 发布方式按钮 */
        .publish-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
        .pub-btn { flex: 1; padding: 0.65rem 1rem; border: 2px solid; border-radius: var(--radius-sm); background: var(--color-surface); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; text-align: center; }
        .pub-btn-publish { color: #48bb78; border-color: #48bb78; }
        .pub-btn-publish:hover { background: #48bb78; color: #fff; }
        .pub-btn-draft { color: #a0aec0; border-color: #a0aec0; }
        .pub-btn-draft:hover { background: #a0aec0; color: #fff; }
        .pub-btn-schedule { color: #ed8936; border-color: #ed8936; }
        .pub-btn-schedule:hover { background: #ed8936; color: #fff; }
        .pub-btn:active { transform: scale(0.97); }
        .schedule-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
        .schedule-row input[type="datetime-local"] { flex: 1; padding: 0.45rem 0.7rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 0.85rem; background: var(--color-bg); color: var(--color-text); }
        /* 文章板块切换 */
        .article-tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 2px solid var(--color-border); }
        .article-tab { padding: 0.5rem 1.2rem; border: none; background: none; cursor: pointer; font-size: 0.85rem; color: var(--color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; display: flex; align-items: center; gap: 0.4rem; }
        .article-tab:hover { color: var(--color-text); }
        .article-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }
        .tab-count { font-size: 0.72rem; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 10px; padding: 0.05rem 0.45rem; font-weight: normal; }
        .article-tab.active .tab-count { border-color: var(--color-primary); color: var(--color-primary); }
        .empty-hint { text-align: center; color: var(--color-text-placeholder); padding: 1.5rem; font-size: 0.85rem; }
        .status-tag { font-size: 0.78rem; white-space: nowrap; }
        .status-published { color: #48bb78; }
        .status-scheduled { color: #ed8936; }
        .status-draft { color: #a0aec0; }
        .data-table .actions { white-space: nowrap; }
        .data-table .actions .btn { margin-right: 0.3rem; }
        .data-table .actions .btn:last-child { margin-right: 0; }
        /* 工具栏按钮组 */
        .toolbar .btn { font-size: 0.85rem; }
        /* 编辑器分栏布局 */
        .editor-split { display: flex; gap: 0; border: 1px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; min-height: 320px; }
        .editor-split .editor-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .editor-split .editor-pane:first-child { border-right: 1px solid var(--color-border); }
        .editor-split textarea { flex: 1; border: none; border-radius: 0; resize: none; min-height: 280px; padding: 0.75rem; font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.7; background: var(--color-bg); color: var(--color-text); outline: none; }
        .editor-split textarea:focus { box-shadow: inset 0 0 0 2px var(--color-primary); }
        .editor-split .preview-pane { flex: 1; overflow-y: auto; padding: 0.75rem; background: var(--color-surface); font-size: 0.88rem; line-height: 1.7; }
        .editor-split .preview-pane:empty::before { content: '预览区域'; color: var(--color-text-placeholder); font-style: italic; }
        .editor-pane-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); padding: 0.3rem 0.75rem; background: var(--color-bg); border-bottom: 1px solid var(--color-border); user-select: none; }
        .md-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; font-size: 0.75rem; color: var(--color-text-muted); }
        .md-status-bar .auto-save-hint { color: var(--color-success-text); opacity: 0; transition: opacity 0.3s; }
        .md-status-bar .auto-save-hint.show { opacity: 1; }
        @media (max-width: 768px) { .editor-split { flex-direction: column; } .editor-split .editor-pane:first-child { border-right: none; border-bottom: 1px solid var(--color-border); } }
        /* 壁纸选择器 */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 0.75rem;
            margin: 0.75rem 0;
        }
        .wallpaper-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
        }
        .wallpaper-item:hover {
            transform: translateY(-2px);
        }
        .wallpaper-item.active {
            border-color: var(--color-primary);
        }
        .wallpaper-thumb {
            width: 72px;
            height: 48px;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        .wallpaper-item span {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
        }
        .wallpaper-item.active span {
            color: var(--color-primary);
            font-weight: 600;
        }
        .comment-count-badge {
            display: inline-block;
            background: var(--color-primary);
            color: #fff;
            font-size: 0.7rem;
            padding: 0 5px;
            border-radius: 8px;
            margin-left: 2px;
            line-height: 1.5;
        }
        .comment-expand-row td {
            padding: 0.6rem 1rem;
            background: var(--color-bg-secondary, #f9f9f9);
        }
        .comment-inner-table {
            margin: 0;
            background: transparent;
        }
        .comment-inner-table th {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            background: transparent;
        }
        .comment-inner-table td {
            background: transparent;
            font-size: 0.85rem;
        }
        .comment-expand-empty {
            text-align: center;
            padding: 1rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        .comment-reply-tag {
            display: inline-block;
            font-size: 0.65rem;
            background: var(--color-primary-light, #eef2ff);
            color: var(--color-primary);
            padding: 1px 4px;
            border-radius: 3px;
            margin-right: 2px;
        }
        /* 评论管理面板 */
        .cp-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: var(--color-bg-card, #fff);
            border: 1px solid var(--color-border);
            border-radius: 8px;
        }
        .cp-toolbar input, .cp-toolbar select {
            padding: 0.35rem 0.6rem;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 0.82rem;
            background: var(--color-bg, #fff);
            color: var(--color-text);
        }
        .cp-toolbar input { width: 140px; }
        .cp-toolbar label {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            white-space: nowrap;
        }
        .cp-sep { width: 1px; height: 24px; background: var(--color-border); margin: 0 0.2rem; }
        .batch-bar {
            display: none;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.8rem;
            background: var(--color-danger-bg, #fff5f5);
            border: 1px solid var(--color-danger-border, #fecaca);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .batch-bar.active { display: flex; }
        .batch-bar .count { font-weight: 600; color: var(--color-danger); }
        .comment-table { width: 100%; }
        .comment-table th { font-size: 0.8rem; }
        .comment-table td { font-size: 0.85rem; }
        .comment-table th.sortable { cursor: pointer; user-select: none; }
        .comment-table th.sortable:hover { color: var(--color-primary); }
        .comment-table th.sortable::after { content: '↕'; margin-left: 4px; opacity: 0.3; }
        .comment-table th.sort-asc::after { content: '↑'; opacity: 0.8; }
        .comment-table th.sort-desc::after { content: '↓'; opacity: 0.8; }
        .cb-cell { width: 36px; text-align: center; }
        .cb-cell input { cursor: pointer; }
        /* 标签颜色点 */
        .tag-color-dot {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
            vertical-align: middle;
        }
        .tag-color-dot:hover { transform: scale(1.15); }
        .tag-color-dot.active { border-color: var(--color-text); }
        .tag-color-presets { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
        .tag-color-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #fff;
        }
        /* 文章标签选择器 */
        .tag-selector { margin-top: 0.5rem; }
        .tag-selector-btn {
            padding: 0.35rem 0.7rem;
            border: 1px dashed var(--color-border);
            background: var(--color-bg);
            color: var(--color-text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.15s;
        }
        .tag-selector-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .tag-selector-dropdown {
            display: none;
            position: relative;
            margin-top: 0.3rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-surface);
            padding: 0.5rem;
            max-height: 160px;
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
        }
        .tag-selector-dropdown.open { display: block; }
        .tag-selector-item {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            margin: 0.2rem;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }
        .tag-selector-item:hover { opacity: 0.85; transform: scale(1.05); }
        .tag-selector-item.selected { opacity: 0.4; cursor: default; transform: none; }
        .tag-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #fff;
        }
        .tag-chip-remove {
            cursor: pointer;
            font-size: 0.9rem;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.15s;
            margin-left: 0.1rem;
        }
        .tag-chip-remove:hover { opacity: 1; }
    </style>
</head>
<body>
    <!-- 管理界面 -->
    <div id="admin-section" class="admin-wrapper">
        <header class="admin-header">
            <h1>后台管理 <span onclick="openPwModal()" style="font-size:0.55em;font-weight:400;color:var(--color-text-muted);cursor:pointer;vertical-align:middle;">修改密码</span></h1>
            <div style="display:flex;align-items:center;gap:0.8rem;">
                <button class="theme-toggle" id="theme-toggle" aria-label="切换主题" title="切换日间/夜间模式" style="width:40px;height:40px;font-size:1.1rem;">☽</button>
                <button class="btn btn-secondary" onclick="logout()">退出登录</button>
            </div>
        </header>

        <!-- Tab 切换 -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="sites" onclick="switchTab('sites')">网站管理</button>
            <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">页面设置</button>
            <button class="tab-btn" data-tab="articles" onclick="switchTab('articles')">文章管理</button>
            <button class="tab-btn" data-tab="tags" onclick="switchTab('tags')">标签管理</button>
        </nav>

        <!-- ========== 网站管理 ========== -->
        <div id="tab-sites" class="tab-content">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openModal()">+ 添加网站</button>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>图标</th>
                        <th>标题</th>
                        <th>网址</th>
                        <th>介绍</th>
                        <th style="width:140px;">操作</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- ========== 页面设置 ========== -->
        <div id="tab-settings" class="tab-content hidden">
            <div class="settings-panel">
                <div class="settings-form">
                    <h3>页面配置</h3>
                    <form id="settings-form" onsubmit="saveSettings(event)">
                        <div class="form-group">
                            <label>页面标题</label>
                            <input type="text" id="set-title" required placeholder="例如：我的导航主页">
                            <p class="form-hint">显示在浏览器标签页和页面顶部</p>
                        </div>
                        <div class="form-group">
                            <label>副标题</label>
                            <input type="text" id="set-subtitle" placeholder="例如：双击卡片即可跳转">
                            <p class="form-hint">显示在标题下方</p>
                        </div>
                        <div class="form-group">
                            <label>页脚文字</label>
                            <input type="text" id="set-footer" placeholder="例如：© 2026">
                            <p class="form-hint">显示在页面底部</p>
                        </div>
                        <div class="form-group">
                            <label>背景壁纸</label>
                            <div class="wallpaper-grid">
                                <div class="wallpaper-item active" data-bg="" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:#faf9f7"></div>
                                    <span>无</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/dawn.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#fdf6f0,#e8d5c4)"></div>
                                    <span>晨曦</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/mist.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#e8edf2,#d0d8e0)"></div>
                                    <span>薄雾</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/ink.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:radial-gradient(#f0ebe6,#d8cec3)"></div>
                                    <span>水墨</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/dusk.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#2c2c2c,#151311)"></div>
                                    <span>黄昏</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/night.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#1a1820,#100e14)"></div>
                                    <span>深夜</span>
                                </div>
                            </div>
                            <input type="text" id="set-bg-image" placeholder="或输入自定义图片URL">
                            <p class="form-hint">选择预设壁纸或输入外部图片链接</p>
                        </div>
                        <div class="modal-actions">
                            <button type="submit" class="btn btn-primary">保存设置</button>
                        </div>
                    </form>
                    <div class="save-hint" id="save-hint">已保存</div>
                </div>

                <div class="preview-box">
                    <h3>实时预览</h3>
                    <div class="preview-area">
                        <div class="preview-title" id="preview-title">一切从这里开始！</div>
                        <div class="preview-subtitle" id="preview-subtitle">双击卡片即可跳转</div>
                        <div class="preview-cards">
                            <div class="preview-card">
                                <div class="preview-card-icon"></div>
                                <div class="preview-card-title">示例网站</div>
                            </div>
                            <div class="preview-card">
                                <div class="preview-card-icon"></div>
                                <div class="preview-card-title">示例网站</div>
                            </div>
                        </div>
                        <div class="preview-footer" id="preview-footer">© 2026</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 文章管理 ========== -->
    <div id="tab-articles" class="tab-content hidden">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openArticleEditor()">+ 写文章</button>
            <button class="btn btn-secondary" onclick="showCommentPanel()">管理评论</button>
        </div>
        <div id="article-list-area"></div>
    </div>

    <!-- ========== 标签管理 ========== -->
    <div id="tab-tags" class="tab-content hidden">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openTagEditor()">+ 新建标签</button>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>标签名</th>
                    <th>标识(slug)</th>

    <div class="modal-overlay" id="pw-modal">
        <div class="modal-content" style="max-width:400px;">
            <h3>修改密码</h3>
            <form id="password-form" onsubmit="changePassword(event)">
                <div class="pw-modal-box">
                <div class="form-group">
                    <label>当前密码</label>
                    <div class="pw-input-wrap"><input type="password" id="pw-current" required placeholder="输入当前密码"><button type="button" class="pw-toggle" onclick="togglePw(this)">显示</button></div>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <div class="pw-input-wrap"><input type="password" id="pw-new" required placeholder="输入新密码" minlength="1" maxlength="100"><button type="button" class="pw-toggle" onclick="togglePw(this)">显示</button></div>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <div class="pw-input-wrap"><input type="password" id="pw-confirm" required placeholder="再次输入新密码" minlength="1" maxlength="100"><button type="button" class="pw-toggle" onclick="togglePw(this)">显示</button></div>
                </div>
                </div>
                <p class="error-msg" id="pw-error" style="display:none"></p>
                <p class="save-hint" id="pw-success" style="display:none">密码修改成功，即将重新登录…</p>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closePwModal()">取消</button>
                    <button type="submit" class="btn btn-primary">确认修改</button>
                </div>
            </form>
        </div>

    <script>
        const API_BASE = '/api/sites';
        const API_SETTINGS = '/api/settings';
        const API_AUTH = '/api/auth';
        function apiFetch(url, opts) { opts = opts || {}; opts.credentials = 'same-origin'; return fetch(url, opts); }

        // 主题初始化
        (function() {
            var saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            var btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.textContent = saved === 'dark' ? '☀' : '☽';
                btn.addEventListener('click', function() {
                    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        btn.textContent = '☽';
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        btn.textContent = '☀';
                    }
                });
            }
        })();

        // 会话检查（Cookie 方式）
        (function() {
            apiFetch(API_AUTH, { credentials: 'same-origin' }).then(function(r) {
                if (!r.ok) window.location.href = '/login.html';
                else loadTable();
            }).catch(function() {
                window.location.href = '/login.html';
            });
        })();

        function logout() {
            apiFetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(function() {
                window.location.href = '/login.html';
            });
        }

        function togglePw(btn) {
            var inp = btn.parentElement.querySelector('input');
            if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '隐藏'; }
            else { inp.type = 'password'; btn.textContent = '显示'; }
        }

        function openPwModal() {
            document.getElementById('pw-error').style.display = 'none';
            document.getElementById('pw-success').style.display = 'none';
            document.getElementById('pw-current').value = '';
            document.getElementById('pw-new').value = '';
            document.getElementById('pw-confirm').value = '';
            document.getElementById('pw-modal').classList.add('active');
        }
        function closePwModal() {
            document.getElementById('pw-modal').classList.remove('active');
        }

        async function changePassword(e) {
            e.preventDefault();
            var errEl = document.getElementById('pw-error');
            var okEl = document.getElementById('pw-success');
            errEl.style.display = 'none';
            okEl.style.display = 'none';

            var cur = document.getElementById('pw-current').value;
            var nw = document.getElementById('pw-new').value;
            var cf = document.getElementById('pw-confirm').value;

            if (nw !== cf) {
                errEl.textContent = '两次输入的新密码不一致';
                errEl.style.display = 'block';
                return;
            }

            try {
                var res = await apiFetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: cur, new_password: nw })
                });
                var data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error || '修改失败';
                    errEl.style.display = 'block';
                    return;
                }
                // 密码修改成功，清除会话跳转登录页
                okEl.style.display = 'block';
                setTimeout(function() { window.location.href = '/login.html'; }, 1500);
            } catch (err) {
                errEl.textContent = '网络错误，请重试';
                errEl.style.display = 'block';
            }
        }

        // ---- Tab 切换 ----
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('hidden', c.id !== 'tab-' + name));
            if (name === 'settings') loadSettings();
            if (name === 'sites') loadTable();
            if (name === 'articles') loadArticles();
            if (name === 'tags') loadTags();
        }

        // ---- 网站管理 ----
        async function loadTable() {
            try {
                const res = await apiFetch(API_BASE);
                const data = await res.json();
                renderTable(data.sites || []);
            } catch (e) {
                document.getElementById('table-body').innerHTML =
                    '<tr><td colspan="5" style="text-align:center">加载失败</td></tr>';
            }
        }

        function renderTable(sites) {
            const tbody = document.getElementById('table-body');
            if (!sites.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-text-placeholder);padding:2rem;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = sites.map(site => {
                let hostname;
                let iconCell;
                if (site.icon) {
                    iconCell = '<img src="' + escapeHtml(site.icon) + '" class="site-icon-preview" onerror="this.style.display=\'none\'; this.parentElement.innerHTML=\'🌐\';">';
                } else {
                    iconCell = '<span style="font-size:1.5rem;">🌐</span>';
                }
                return `
                    <tr>
                        <td>${iconCell}</td>
                        <td>${escapeHtml(site.title)}</td>
                        <td><a href="${escapeHtml(site.url)}" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary);">${escapeHtml(site.url)}</a></td>
                        <td>${escapeHtml(site.description || '')}</td>
                        <td class="actions">
                            <button class="btn btn-secondary btn-sm" onclick="editSite(${site.id})">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSite(${site.id})">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function openModal(id) {
            document.getElementById('modal').classList.add('active');
            document.getElementById('edit-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('edit-icon').value = '';
            document.getElementById('edit-icon-file').value = '';
            document.getElementById('icon-preview').innerHTML = '🌐';
            document.getElementById('modal-title').textContent = id ? '编辑网站' : '添加网站';
            if (id) {
                apiFetch(API_BASE + '/' + id).then(r => r.json()).then(site => {
                    document.getElementById('edit-id').value = site.id;
                    document.getElementById('edit-title').value = site.title;
                    document.getElementById('edit-url').value = site.url;
                    document.getElementById('edit-icon').value = site.icon || '';
                    document.getElementById('edit-desc').value = site.description || '';
                    updateIconPreview(site.icon);
                });
            }
        }

        function handleIconFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var size = Math.min(img.width, img.height);
                    canvas.width = 64; canvas.height = 64;
                    var ctx = canvas.getContext('2d');
                    var sx = (img.width - size) / 2;
                    var sy = (img.height - size) / 2;
                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 64, 64);
                    var base64 = canvas.toDataURL('image/png', 0.7);
                    document.getElementById('edit-icon').value = base64;
                    updateIconPreview(base64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateIconPreview(src) {
            var preview = document.getElementById('icon-preview');
            if (src && src.startsWith('data:')) {
                preview.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">';
            } else if (src && src.startsWith('http')) {
                preview.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.parentElement.innerHTML=\'🌐\';">';
            } else {
                preview.innerHTML = '🌐';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function saveSite(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const body = {
                title: document.getElementById('edit-title').value.trim(),
                url: document.getElementById('edit-url').value.trim(),
                icon: document.getElementById('edit-icon').value.trim(),
                description: document.getElementById('edit-desc').value.trim()
            };
            const url = id ? API_BASE + '/' + id : API_BASE + '/new';
            const res = await apiFetch(url, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) { closeModal(); loadTable(); }
            else if (res.status === 401) { alert('登录已过期'); logout(); }
            else { alert('保存失败'); }
        }

        function editSite(id) { openModal(id); }

        async function deleteSite(id) {
            if (!confirm('确定删除？')) return;
            const res = await apiFetch(API_BASE + '/' + id, {
                method: 'DELETE',
                headers: {  }
            });
            if (res.ok) loadTable();
            else if (res.status === 401) { alert('登录已过期'); logout(); }
        }

        // ---- 页面设置 ----
        async function loadSettings() {
            try {
                const res = await apiFetch(API_SETTINGS);
                const data = await res.json();
                document.getElementById('set-title').value = data.title || '';
                document.getElementById('set-subtitle').value = data.subtitle || '';
                document.getElementById('set-footer').value = data.footer || '';
                var bg = data.bg_image || '';
                document.getElementById('set-bg-image').value = bg;
                // 激活对应壁纸项
                document.querySelectorAll('.wallpaper-item').forEach(function(el) {
                    el.classList.toggle('active', el.dataset.bg === bg);
                });
                updatePreview();
            } catch (e) { /* ignore */ }
        }

        function updatePreview() {
            document.getElementById('preview-title').textContent = document.getElementById('set-title').value || '我的导航主页';
            document.getElementById('preview-subtitle').textContent = document.getElementById('set-subtitle').value || '';
            document.getElementById('preview-footer').textContent = document.getElementById('set-footer').value || '';
        }

        // 处理中文输入法：composition 期间不更新，等输入法确认后再刷新
        var composing = false;
        ['set-title', 'set-subtitle', 'set-footer'].forEach(function(id) {
            var el = document.getElementById(id);
            el.addEventListener('compositionstart', function() { composing = true; });
            el.addEventListener('compositionend', function() {
                composing = false;
                updatePreview();
            });
            el.addEventListener('input', function() {
                if (!composing) updatePreview();
            });
        });

        function selectWallpaper(el) {
            document.querySelectorAll('.wallpaper-item').forEach(function(item) {
                item.classList.remove('active');
            });
            el.classList.add('active');
            document.getElementById('set-bg-image').value = el.dataset.bg || '';
        }

        async function saveSettings(e) {
            e.preventDefault();
            var bgVal = document.getElementById('set-bg-image').value.trim();
            // 如果有预设选中且自定义为空，用预设值
            if (!bgVal) {
                var active = document.querySelector('.wallpaper-item.active');
                if (active) bgVal = active.dataset.bg || '';
            }
            const body = {
                title: document.getElementById('set-title').value.trim(),
                subtitle: document.getElementById('set-subtitle').value.trim(),
                footer: document.getElementById('set-footer').value.trim(),
                bg_image: bgVal
            };
            const res = await apiFetch(API_SETTINGS, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                const hint = document.getElementById('save-hint');
                hint.classList.add('show');
                setTimeout(function() { hint.classList.remove('show'); }, 2000);
            } else if (res.status === 401) {
                alert('登录已过期'); logout();
            } else {
                alert('保存失败');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // ---- 文章管理 ----
        var _commentMap = {};

        async function loadArticles() {
            try {
                var [articlesRes, commentsRes] = await Promise.all([
                    apiFetch('/api/articles?all=1'),
                    apiFetch('/api/comments?all=1', { headers: {  } })
                ]);
                var articlesData = await articlesRes.json();
                var commentsData = await commentsRes.json();
                _commentMap = {};
                (commentsData.comments || []).forEach(function(c) {

        function isArticlePublished(a) {
            if (a.scheduled_at) {
                var sd = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
                return sd <= new Date() ? true : false;
            }
            return !!a.is_published;
        }

        function isArticleScheduled(a) {
            if (!a.scheduled_at) return false;
            var sd = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
            return sd > new Date();
        }

        function formatArticleStatus(a) {
            if (isArticleScheduled(a)) {
                var sd = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
                return '<span class="status-tag status-scheduled">⏰ ' + sd.toLocaleDateString('zh-CN') + ' ' + sd.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</span>';
            }
            if (a.is_published) return '<span class="status-tag status-published">● 已发布</span>';
            return '<span class="status-tag status-draft">○ 草稿</span>';
        }

        function buildArticleRow(a) {
            var time = (a.created_at || '').slice(0, 10);
            var cc = (_commentMap[a.id] || []).length;
            var ccHtml = cc ? ' <span class="comment-count-badge">' + cc + '</span>' : '';
            return '<tr><td><strong>' + escapeHtml(a.title) + '</strong>' + ccHtml + '</td><td>' + escapeHtml(a.author) + '</td><td>' + formatArticleStatus(a) + '</td><td>' + escapeHtml(a.tags||'') + '</td><td>' + time + '</td><td class="actions"><button class="btn btn-secondary btn-sm" onclick="editArticle(' + a.id + ')">编辑</button><button class="btn btn-danger btn-sm" onclick="deleteArticle(' + a.id + ')">删除</button></td></tr>';

        // Markdown 快速插入
        // 工具栏命令表：before=前缀, after=后缀, placeholder=无选中时的占位文本
        // block=true 表示行级命令（标题/列表/引用等），需要确保在行首
        var MD_CMDS = {
            bold:       { before: '**',     after: '**',        ph: '加粗文字',   inline: true },
            italic:     { before: '*',      after: '*',         ph: '斜体文字',   inline: true },
            strike:     { before: '~~',     after: '~~',        ph: '删除线文字', inline: true },
            code:       { before: '`',      after: '`',         ph: '代码',       inline: true },
            link:       { before: '[',      after: '](url)',    ph: '链接文字',   inline: true },
            image:      { before: '![',     after: '](url)',    ph: '图片描述',   inline: true },
            h1:         { before: '# ',     after: '',          ph: '标题',       block: true },
            h2:         { before: '## ',    after: '',          ph: '二级标题',   block: true },
            h3:         { before: '### ',   after: '',          ph: '三级标题',   block: true },
            quote:      { before: '> ',     after: '',          ph: '引用内容',   block: true },
            ul:         { before: '- ',     after: '',          ph: '列表项',     block: true },
            ol:         { before: '1. ',    after: '',          ph: '列表项',     block: true },
            codeblock:  { before: '```\n',  after: '\n```',     ph: '代码',       block: true },
            table:      { before: '| 列1 | 列2 |\n| ----- | ----- |\n| ', after: ' |\n', ph: '内容', block: true },
            hr:         { before: '\n---\n', after: '',         ph: '',           block: true }
        };

        // ── 撤销栈：解决直接设 ta.value 不进浏览器撤销栈的问题 ──
        var _undoStack = [];
        var _redoStack = [];
        var _lastSavedValue = null;

        function _saveUndoState(ta) {
            var current = ta.value;
            // 避免重复保存相同内容
            if (current === _lastSavedValue) return;
            _undoStack.push({ value: current, selStart: ta.selectionStart, selEnd: ta.selectionEnd });
            if (_undoStack.length > 50) _undoStack.shift(); // 最多 50 步
            _redoStack = []; // 新操作清空 redo 栈
            _lastSavedValue = current;
        }

        function _undo(ta) {
            if (!_undoStack.length) return;
            // 保存当前状态到 redo 栈
            _redoStack.push({ value: ta.value, selStart: ta.selectionStart, selEnd: ta.selectionEnd });
            var state = _undoStack.pop();
            ta.value = state.value;
            ta.selectionStart = state.selStart;
            ta.selectionEnd = state.selEnd;
            _lastSavedValue = state.value;
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function _redo(ta) {
            if (!_redoStack.length) return;
            _undoStack.push({ value: ta.value, selStart: ta.selectionStart, selEnd: ta.selectionEnd });
            var state = _redoStack.pop();
            ta.value = state.value;
            ta.selectionStart = state.selStart;
            ta.selectionEnd = state.selEnd;
            _lastSavedValue = state.value;
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function insertMD(type) {
            var cmd = MD_CMDS[type];
            if (!cmd) { console.warn('Unknown MD command:', type); return; }
            var ta = document.getElementById('article-content-md');
            if (!ta) { console.error('Textarea not found'); return; }

            // 核心：先聚焦 textarea，确保 selectionStart/End 可靠
            ta.focus();

            // 等焦点稳定后再操作（解决某些浏览器的异步焦点问题）
            requestAnimationFrame(function() {
                try {
                    var s = ta.selectionStart, e = ta.selectionEnd;
                    var val = ta.value;
                    var sel = val.substring(s, e);
                    var hasSel = s !== e;
                    var text = sel || cmd.ph;
                    var result;

                    if (cmd.block) {
                        // ── block 级命令（标题/列表/引用/代码块等）──
                        var ls = val.lastIndexOf('\n', s - 1) + 1;
                        var lineBefore = val.substring(ls, s);

                        if (hasSel && sel.indexOf('\n') !== -1) {
                            // 多行选区：每行加前缀
                            result = sel.split('\n').map(function(l) { return cmd.before + l; }).join('\n') + cmd.after;
                        } else if (lineBefore.trim() === '') {
                            // 行首：直接插入
                            result = cmd.before + text + cmd.after;
                        } else {
                            // 行中间：先换行再插入
                            result = '\n' + cmd.before + text + cmd.after;
                        }
                    } else {
                        // ── inline 级命令（加粗/斜体/代码/链接等）──
                        result = cmd.before + text + cmd.after;
                    }

                    // 保存撤销状态
                    _saveUndoState(ta);

                    // 直接拼接 value（比 setRangeText 跨浏览器兼容性更好）
                    var newVal = val.substring(0, s) + result + val.substring(e);
                    ta.value = newVal;

                    // 设置光标位置
                    if (cmd.inline && !hasSel) {
                        // inline 无选区：选中占位文本，方便用户直接打字替换
                        ta.selectionStart = s + cmd.before.length;
                        ta.selectionEnd = s + cmd.before.length + text.length;
                    } else {
                        // 其他情况：光标放在插入内容末尾
                        ta.selectionStart = ta.selectionEnd = s + result.length;
                    }

                    // 手动触发 input 事件（直接改 value 不会自动触发）
                    ta.dispatchEvent(new Event('input', { bubbles: true }));

                } catch(err) {
                    console.error('insertMD error:', err);
                    alert('工具栏操作失败: ' + err.message);
                }
            });
        }

        // 图片上传并插入 base64
        function uploadMDImage(input) {
            var file = input.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { alert('图片不能超过 5MB'); input.value = ''; return; }
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var maxW = 1200, maxH = 800;
                    var w = img.width, h = img.height;
                    if (w > maxW) { h = h * maxW / w; w = maxW; }
                    if (h > maxH) { w = w * maxH / h; h = maxH; }
                    canvas.width = Math.round(w); canvas.height = Math.round(h);
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    var base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1]; // 去掉 data:xxx;base64, 前缀
                    uploadToServer(file.name, 'image/jpeg', base64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        async function uploadToServer(filename, mime, data) {
            try {
                var res = await apiFetch('/api/images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: filename, mime_type: mime, data: data })
                });
                if (res.ok) {
                    var result = await res.json();
                    var mdImg = '\n![' + filename + '](' + result.url + ')\n';
                    var ta = document.getElementById('article-content-md');
                    ta.focus();
                    _saveUndoState(ta);
                    var pos = ta.selectionStart;
                    ta.value = ta.value.substring(0, pos) + mdImg + ta.value.substring(ta.selectionEnd);
                    ta.selectionStart = ta.selectionEnd = pos + mdImg.length;
                    ta.dispatchEvent(new Event('input', { bubbles: true }));
                } else {
                    alert('图片上传失败');
                }
            } catch(e) {
                alert('图片上传失败: ' + e.message);
            }
        }

        function updateArticlePreview() {
            var md = document.getElementById('article-content-md').value || '';

            var preview = document.getElementById('article-preview');

            }
        }

        // ── 自动保存 ──
        var _autoSaveTimer = null;
        var AUTOSAVE_KEY = 'ayoo_draft';

        function autoSave() {

                title: document.getElementById('article-title').value,

        function loadDraft() {

        }

        function clearDraft() {

        function restoreDraft(draft) {
            if (!draft) return;
            // 不恢复 editId，避免新建文章时误更新旧文章
            document.getElementById('article-edit-id').value = '';

            document.getElementById('article-slug').value = draft.slug || '';

            document.getElementById('article-content-md').dispatchEvent(new Event('input', { bubbles: true }));

        // 监听所有表单字段的输入，触发自动保存
        function bindAutoSaveListeners() {
            var fields = ['article-title','article-slug','article-summary','article-cover','article-content-md','article-author','article-tags','article-scheduled'];
            fields.forEach(function(id) {
                var el = document.getElementById(id);
                if (!el) return;
                if (id === 'article-content-md') {
                    // textarea 同时触发预览更新 + 自动保存
                    el.addEventListener('input', function() { updateArticlePreview(); scheduleAutoSave(); });
                } else if (id === 'article-tags') {
                    el.addEventListener('input', function() { updateArticleTagChips(); scheduleAutoSave(); });
                } else {
                    el.addEventListener('input', scheduleAutoSave);
                }
            });
        }

        // 导入 .md 文件
        function importMDFile(input) {
            var file = input.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert('文件不能超过 2MB'); input.value = ''; return; }
            var reader = new FileReader();
            reader.onload = function(e) {
                var ta = document.getElementById('article-content-md');
                var existing = ta.value;
                if (existing && !confirm('当前编辑器已有内容，导入会覆盖。确定继续？')) { input.value = ''; return; }
                ta.value = e.target.result;
                ta.dispatchEvent(new Event('input', { bubbles: true }));
                var titleEl = document.getElementById('article-title');
                if (!titleEl.value) {
                    var name = file.name.replace(/\.(md|txt|markdown)$/i, '');
                    titleEl.value = name;
                    document.getElementById('article-slug').value = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                }
                updateArticlePreview();
                scheduleAutoSave();
            };
            reader.readAsText(file);
            input.value = '';
        }

        // textarea 输入监听（合并到 bindAutoSaveListeners 统一管理，避免重复绑定）

        // 键盘快捷键（只在编辑器打开时生效）
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('article-modal').classList.contains('active')) return;
            var mod = e.ctrlKey || e.metaKey;
            if (!mod) return;
            var k = e.key.toLowerCase();
            if (k === 'z' && !e.shiftKey) {
                // Ctrl+Z：撤销（用自定义栈覆盖浏览器原生行为）
                e.preventDefault();
                var ta = document.getElementById('article-content-md');
                if (ta && document.activeElement === ta) _undo(ta);
            } else if ((k === 'z' && e.shiftKey) || k === 'y') {
                // Ctrl+Shift+Z 或 Ctrl+Y：重做
                e.preventDefault();
                var ta = document.getElementById('article-content-md');
                if (ta && document.activeElement === ta) _redo(ta);
            } else if (k === 'b') { e.preventDefault(); insertMD('bold'); }
            else if (k === 'i') { e.preventDefault(); insertMD('italic'); }
            else if (k === 'd') { e.preventDefault(); insertMD('code'); }
            else if (k === 'k') { e.preventDefault(); insertMD('link'); }
            else if (k === 's') { e.preventDefault(); document.getElementById('article-form').requestSubmit(); }
        });

        function renderCommentPanel() {
            var area = document.getElementById('article-list-area');
            // 收集文章列表用于筛选下拉
            var articles = {};
            _allComments.forEach(function(c) {
                if (c.article_id && !articles[c.article_id]) articles[c.article_id] = c.article_title || ('文章#' + c.article_id);
            });
            var articleOpts = '<option value="">全部文章</option>';
            Object.keys(articles).forEach(function(id) {
                var sel = _cpFilter.article === id ? ' selected' : '';
                articleOpts += '<option value="' + id + '"' + sel + '>' + escapeHtml(articles[id]) + '</option>';
            });

            var html = '<div class="cp-toolbar">'
                + '<button class="btn btn-secondary btn-sm" onclick="loadArticles()">← 返回文章列表</button>'
                + '<div class="cp-sep"></div>'
                + '<label>文章</label><select id="cp-filter-article" onchange="cpFilterChange()">' + articleOpts + '</select>'
                + '<label>昵称</label><input type="text" id="cp-filter-name" placeholder="搜索昵称" value="' + escapeHtml(_cpFilter.name) + '" oninput="cpFilterChange()">'
                + '<label>内容</label><input type="text" id="cp-filter-content" placeholder="搜索内容" value="' + escapeHtml(_cpFilter.content) + '" oninput="cpFilterChange()">'
                + '</div>'
                + '<div class="batch-bar" id="cp-batch-bar">'
                + '<span>已选 <span class="count" id="cp-selected-count">0</span> 条</span>'
                + '<button class="btn btn-danger btn-sm" onclick="batchDeleteComments()">批量删除</button>'
                + '</div>'
                + '<div id="cp-table-area"></div>';
            area.innerHTML = html;
            renderCommentTable();
        }

        function cpFilterChange() {
            _cpFilter.article = document.getElementById('cp-filter-article').value;
            _cpFilter.name = (document.getElementById('cp-filter-name').value || '').trim().toLowerCase();
            _cpFilter.content = (document.getElementById('cp-filter-content').value || '').trim().toLowerCase();
            renderCommentTable();
        }

        function getFilteredComments() {
            return _allComments.filter(function(c) {
                if (_cpFilter.article && String(c.article_id) !== _cpFilter.article) return false;
                if (_cpFilter.name && (c.author_name || '').toLowerCase().indexOf(_cpFilter.name) < 0) return false;
                if (_cpFilter.content && (c.content || '').toLowerCase().indexOf(_cpFilter.content) < 0) return false;
                return true;
            });
        }

        function cpSort(key) {
            if (_cpSort.key === key) {
                _cpSort.dir = _cpSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                _cpSort.key = key;
                _cpSort.dir = key === 'created_at' ? 'desc' : 'asc';
            }
            renderCommentTable();
        }

        function renderCommentTable() {
            var filtered = getFilteredComments();
            // 排序
            filtered.sort(function(a, b) {
                var va = '', vb = '';
                if (_cpSort.key === 'created_at') { va = a.created_at || ''; vb = b.created_at || ''; }
                else if (_cpSort.key === 'author_name') { va = (a.author_name || '').toLowerCase(); vb = (b.author_name || '').toLowerCase(); }
                else if (_cpSort.key === 'article') { va = (a.article_title || '').toLowerCase(); vb = (b.article_title || '').toLowerCase(); }
                if (va < vb) return _cpSort.dir === 'asc' ? -1 : 1;
                if (va > vb) return _cpSort.dir === 'asc' ? 1 : -1;
                return 0;
            });

            var sortClass = function(key) {
                if (_cpSort.key !== key) return 'sortable';
                return 'sortable sort-' + _cpSort.dir;
            };

            var html = '<table class="data-table comment-table"><thead><tr>'
                + '<th class="cb-cell"><input type="checkbox" id="cp-select-all" onchange="cpToggleAll(this)"></th>'
                + '<th class="' + sortClass('author_name') + '" onclick="cpSort(\'author_name\')">昵称</th>'
                + '<th>内容</th>'
                + '<th class="' + sortClass('article') + '" onclick="cpSort(\'article\')">文章</th>'
                + '<th class="' + sortClass('created_at') + '" onclick="cpSort(\'created_at\')">时间</th>'
                + '<th>操作</th>'
                + '</tr></thead><tbody>';

            if (!filtered.length) {
                html += '<tr><td colspan="6" style="text-align:center;color:var(--color-text-muted);padding:2rem;">暂无匹配评论</td></tr>';
            } else {
                for (var i = 0; i < filtered.length; i++) {
                    var c = filtered[i];
                    var time = (c.created_at || '').slice(0, 16).replace('T', ' ');
                    var content = (c.content || '').length > 80 ? c.content.slice(0, 80) + '...' : (c.content || '');
                    var prefix = c.parent_id ? '<span class="comment-reply-tag">回复</span> ' : '';
                    html += '<tr>'
                        + '<td class="cb-cell"><input type="checkbox" class="cp-cb" data-id="' + c.id + '" onchange="cpUpdateSelected()"></td>'
                        + '<td style="white-space:nowrap;">' + prefix + escapeHtml(c.author_name || '') + '</td>'
                        + '<td>' + escapeHtml(content) + '</td>'
                        + '<td><a href="/blog/' + (c.article_slug || '') + '" target="_blank" style="color:var(--color-primary);text-decoration:none;font-size:0.82rem;">' + escapeHtml(c.article_title || '') + '</a></td>'
                        + '<td style="white-space:nowrap;font-size:0.8rem;">' + time + '</td>'
                        + '<td><button class="btn btn-sm btn-danger" onclick="deleteSingleComment(' + c.id + ')">删除</button></td>'
                        + '</tr>';
                }
            }
            html += '</tbody></table>';
            document.getElementById('cp-table-area').innerHTML = html;
            cpUpdateSelected();
        }

        function cpToggleAll(el) {
            var cbs = document.querySelectorAll('.cp-cb');
            for (var i = 0; i < cbs.length; i++) cbs[i].checked = el.checked;
            cpUpdateSelected();
        }

        function cpUpdateSelected() {
            var cbs = document.querySelectorAll('.cp-cb:checked');
            var count = cbs.length;
            document.getElementById('cp-selected-count').textContent = count;
            var bar = document.getElementById('cp-batch-bar');
            if (count > 0) bar.classList.add('active'); else bar.classList.remove('active');
            // 更新全选 checkbox 状态
            var all = document.querySelectorAll('.cp-cb');
            var sa = document.getElementById('cp-select-all');
            if (all.length === 0) { sa.checked = false; sa.indeterminate = false; }
            else if (count === all.length) { sa.checked = true; sa.indeterminate = false; }
            else { sa.checked = false; sa.indeterminate = true; }
        }

        function deleteSingleComment(id) {
            if (!confirm('确定删除这条评论及其所有回复？')) return;
            apiFetch('/api/comments/' + id, {
                method: 'DELETE',
                headers: {  }
            }).then(function(r) { if (!r.ok) throw new Error(); })
            .then(function() { _allComments = _allComments.filter(function(c) { return c.id !== id; }); renderCommentPanel(); })
            .catch(function() { alert('删除失败'); });
        }

        function batchDeleteComments() {
            var cbs = document.querySelectorAll('.cp-cb:checked');
            var ids = [];
            for (var i = 0; i < cbs.length; i++) ids.push(parseInt(cbs[i].dataset.id));
            if (!ids.length) return;
            if (!confirm('确定删除选中的 ' + ids.length + ' 条评论及其回复？')) return;
            var btn = document.querySelector('#cp-batch-bar .btn-danger');
            if (btn) { btn.disabled = true; btn.textContent = '删除中...'; }
            Promise.all(ids.map(function(id) {
                return apiFetch('/api/comments/' + id, {
                    method: 'DELETE',
                    headers: {  }
                }).then(function(r) { return r.ok ? id : null; });
            })).then(function(results) {
                var deleted = results.filter(Boolean);
                _allComments = _allComments.filter(function(c) { return deleted.indexOf(c.id) < 0; });
                renderCommentPanel();
            }).catch(function() {
                alert('部分删除失败');
                showCommentPanel();
            });
        }

        // ---- 标签管理 ----
        var _allTags = [];

        async function loadTags() {
            try {
                var res = await apiFetch('/api/tags');
                var data = await res.json();
                _allTags = data.tags || [];
                renderTagsTable(_allTags);
            } catch (e) {
                document.getElementById('tags-table-body').innerHTML =
                    '<tr><td colspan="4" style="text-align:center;color:var(--color-danger);padding:2rem;">加载失败</td></tr>';
            }
        }

        function renderTagsTable(tags) {
            var tbody = document.getElementById('tags-table-body');
            if (!tags.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--color-text-placeholder);padding:2rem;">暂无标签</td></tr>';
                return;
            }
            tbody.innerHTML = tags.map(function(t) {
                var color = t.color || '#6366f1';
                return '<tr>'
                    + '<td><span class="tag-color-badge" style="background:' + escapeHtml(color) + '">' + escapeHtml(t.name) + '</span></td>'
                    + '<td><code style="font-size:0.82rem;color:var(--color-text-secondary);">' + escapeHtml(t.slug || '') + '</code></td>'
                    + '<td><span class="tag-color-dot" style="background:' + escapeHtml(color) + ';cursor:default;"></span> <span style="font-size:0.8rem;color:var(--color-text-muted);">' + escapeHtml(color) + '</span></td>'
                    + '<td class="actions">'
                    + '<button class="btn btn-secondary btn-sm" onclick="openTagEditor(' + t.id + ')">编辑</button>'
                    + '<button class="btn btn-danger btn-sm" onclick="deleteTag(' + t.id + ')">删除</button>'
                    + '</td></tr>';
            }).join('');
        }

        function openTagEditor(id) {
            document.getElementById('tag-modal').classList.add('active');
            document.getElementById('tag-form').reset();
            document.getElementById('tag-edit-id').value = '';
            document.getElementById('tag-color').value = '#6366f1';
            document.getElementById('tag-modal-title').textContent = id ? '编辑标签' : '新建标签';
            // 重置颜色选择
            document.querySelectorAll('#tag-color-presets .tag-color-dot').forEach(function(d) {
                d.classList.toggle('active', d.dataset.color === '#6366f1');
            });
            document.getElementById('tag-color-picker').value = '#6366f1';

            if (id) {
                var tag = _allTags.find(function(t) { return t.id === id; });
                if (tag) {
                    document.getElementById('tag-edit-id').value = tag.id;
                    document.getElementById('tag-name').value = tag.name || '';
                    document.getElementById('tag-slug').value = tag.slug || '';
                    document.getElementById('tag-color').value = tag.color || '#6366f1';
                    document.getElementById('tag-color-picker').value = tag.color || '#6366f1';
                    document.querySelectorAll('#tag-color-presets .tag-color-dot').forEach(function(d) {
                        d.classList.toggle('active', d.dataset.color === (tag.color || '#6366f1'));
                    });
                }
            }
        }

        function closeTagEditor() {
            document.getElementById('tag-modal').classList.remove('active');
        }

        function selectTagColor(el) {
            var color = el.dataset.color;
            document.getElementById('tag-color').value = color;
            document.getElementById('tag-color-picker').value = color;
            document.querySelectorAll('#tag-color-presets .tag-color-dot').forEach(function(d) {
                d.classList.remove('active');
            });
            el.classList.add('active');
        }

        async function saveTag(e) {
            e.preventDefault();
            var id = document.getElementById('tag-edit-id').value;
            var body = {
                name: document.getElementById('tag-name').value.trim(),
                slug: document.getElementById('tag-slug').value.trim(),
                color: document.getElementById('tag-color').value
            };
            if (!body.name) { alert('请输入标签名'); return; }

            var url = id ? '/api/tags/' + id : '/api/tags';
            var res = await apiFetch(url, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) { closeTagEditor(); loadTags(); }
            else if (res.status === 401) { alert('登录已过期'); logout(); }
            else {
                var errData = await res.json().catch(function() { return {}; });
                alert('保存失败: ' + (errData.error || res.status));
            }
        }

        async function deleteTag(id) {
            var tag = _allTags.find(function(t) { return t.id === id; });
            var name = tag ? tag.name : '';
            if (!confirm('确定删除标签"' + name + '"？')) return;
            var res = await apiFetch('/api/tags/' + id, {
                method: 'DELETE',
                headers: {  }
            });
            if (res.ok) loadTags();
            else if (res.status === 401) { alert('登录已过期'); logout(); }
            else { alert('删除失败'); }
        }

        // ---- 文章编辑器中的标签选择器 ----
        var _tagSelectorOpen = false;

        function toggleTagSelector() {
            _tagSelectorOpen = !_tagSelectorOpen;
            var dropdown = document.getElementById('tag-selector-dropdown');
            if (_tagSelectorOpen) {
                loadTagSelector();
                dropdown.classList.add('open');
            } else {
                dropdown.classList.remove('open');
            }
        }

        function getSelectedArticleTags() {
            var val = document.getElementById('article-tags').value.trim();
            if (!val) return [];
            return val.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        }

        async function loadTagSelector() {
            var dropdown = document.getElementById('tag-selector-dropdown');
            if (!_allTags.length) {
                try {
                    var res = await apiFetch('/api/tags');
                    var data = await res.json();
                    _allTags = data.tags || [];
                } catch (e) {
                    dropdown.innerHTML = '<span style="color:var(--color-text-muted);font-size:0.82rem;">加载失败</span>';
                    return;
                }
            }
            if (!_allTags.length) {
                dropdown.innerHTML = '<span style="color:var(--color-text-muted);font-size:0.82rem;">暂无标签，请先到标签管理中创建</span>';
                return;
            }
            var selected = getSelectedArticleTags();
            dropdown.innerHTML = _allTags.map(function(t) {
                var isSelected = selected.indexOf(t.name) >= 0;
                var cls = 'tag-selector-item' + (isSelected ? ' selected' : '');
                return '<span class="' + cls + '" style="background:' + escapeHtml(t.color || '#6366f1') + '" onclick="addTagToSelector(\'' + escapeHtml(t.name).replace(/'/g, "\\'") + '\')">' + escapeHtml(t.name) + '</span>';
            }).join('');
            updateArticleTagChips();
        }

        function addTagToSelector(name) {
            var input = document.getElementById('article-tags');
            var current = getSelectedArticleTags();
            if (current.indexOf(name) >= 0) return; // already added
            current.push(name);
            input.value = current.join(', ');
            input.dispatchEvent(new Event('input', { bubbles: true }));
            loadTagSelector(); // refresh dropdown to show selected state
        }

        function removeTagChip(name) {
            var input = document.getElementById('article-tags');
            var current = getSelectedArticleTags();
            current = current.filter(function(t) { return t !== name; });
            input.value = current.join(', ');
            input.dispatchEvent(new Event('input', { bubbles: true }));
            updateArticleTagChips();
            if (_tagSelectorOpen) loadTagSelector();
        }

        function updateArticleTagChips() {
            var container = document.getElementById('article-tag-chips');
            var selected = getSelectedArticleTags();
            if (!selected.length) { container.innerHTML = ''; return; }
            var colorMap = {};
            _allTags.forEach(function(t) { colorMap[t.name] = t.color || '#6366f1'; });
            container.innerHTML = selected.map(function(name) {
                var color = colorMap[name] || '#6b7280';
                return '<span class="tag-chip" style="background:' + escapeHtml(color) + '">'
                    + escapeHtml(name)
                    + '<span class="tag-chip-remove" onclick="removeTagChip(\'' + escapeHtml(name).replace(/'/g, "\\'") + '\')">&times;</span>'
                    + '</span>';
            }).join('');
        }
    </script>
</body>
</html>
