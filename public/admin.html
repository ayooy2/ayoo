<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .login-box {
            max-width: 360px;
            margin: 10vh auto;
            padding: 2rem;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--color-text);
        }
        .login-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 0.8rem;
            background: var(--color-primary);
            color: var(--color-text-inverse);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            cursor: pointer;
        }
        .login-box button:hover { background: var(--color-primary-hover); }
        .error-msg {
            color: var(--color-danger);
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .hidden { display: none !important; }
        /* Tab 切换 */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--color-border);
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.7rem 1.5rem;
            border: none;
            background: none;
            font-size: var(--text-base);
            cursor: pointer;
            color: var(--color-text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            font-weight: 600;
        }
        /* 设置面板 */
        .settings-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .settings-panel { grid-template-columns: 1fr; }
        }
        .settings-form {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .settings-form h3 {
            margin-bottom: 1.2rem;
            color: var(--color-text);
        }
        .preview-box {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .preview-box h3 {
            margin-bottom: 1rem;
            color: var(--color-text);
        }
        .preview-area {
            background: var(--color-bg);
            border-radius: 10px;
            padding: 2rem 1.5rem;
            text-align: center;
            min-height: 200px;
        }
        .preview-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: var(--color-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .preview-subtitle {
            color: var(--color-text-placeholder);
            font-size: var(--text-base);
            margin-bottom: 2rem;
        }
        .preview-cards {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .preview-card {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            padding: 1.2rem 1rem;
            box-shadow: var(--shadow-sm);
            width: 140px;
        }
        .preview-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-border);
            margin: 0 auto 0.6rem;
        }
        .preview-card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text);
        }
        .preview-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--color-text-placeholder);
            font-size: 0.85rem;
        }
        .save-hint {
            margin-top: 1rem;
            padding: 0.7rem;
            background: var(--color-success-bg);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--color-success-text);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-hint.show { opacity: 1; }
        .md-btn {
            padding: 0.25rem 0.5rem; border: 1px solid var(--color-border);
            background: var(--color-bg); color: var(--color-text-secondary);
            border-radius: 4px; cursor: pointer; font-size: 0.78rem;
            font-weight: 600; transition: all 0.15s;
            -webkit-user-select: none; user-select: none;
        }
        .md-btn:hover { background: var(--color-primary-light); border-color: var(--color-primary); color: var(--color-primary); }
        .md-btn:active { transform: scale(0.95); background: var(--color-primary-light); border-color: var(--color-primary); }
        .md-upload { display: inline-flex; align-items: center; gap: 0.2rem; }
        /* 发布方式选择 */
        .publish-mode-group { display: flex; gap: 0; margin-top: 0.4rem; background: var(--color-bg); border-radius: var(--radius-sm); border: 1px solid var(--color-border); overflow: hidden; width: fit-content; }
        .publish-mode-option { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; font-weight: normal; font-size: 0.82rem; padding: 0.4rem 0.8rem; border-right: 1px solid var(--color-border); transition: background 0.15s; color: var(--color-text-secondary); }
        .publish-mode-option:last-child { border-right: none; }
        .publish-mode-option:hover { background: var(--color-primary-light); }
        .publish-mode-option input[type="radio"] { display: none; }
        .publish-mode-option.active { background: var(--color-primary); color: var(--color-text-inverse); }
        .schedule-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
        .schedule-row input[type="datetime-local"] { flex: 1; padding: 0.4rem 0.6rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 0.85rem; background: var(--color-bg); color: var(--color-text); }
        /* 文章板块 */
        .article-section { margin-bottom: 2rem; }
        .article-section-title { font-size: 0.8rem; font-weight: 600; color: var(--color-text-secondary); letter-spacing: 0.06em; margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 0.5rem; }
        .article-section-title .count { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 10px; padding: 0.1rem 0.5rem; font-size: 0.72rem; font-weight: normal; color: var(--color-text-muted); }
        .empty-hint { text-align: center; color: var(--color-text-placeholder); padding: 1.5rem; font-size: 0.85rem; }
        .status-tag { font-size: 0.78rem; white-space: nowrap; }
        .status-published { color: #48bb78; }
        .status-scheduled { color: #ed8936; }
        .status-draft { color: #a0aec0; }
        .data-table .actions { white-space: nowrap; }
        .data-table .actions .btn { margin-right: 0.3rem; }
        .data-table .actions .btn:last-child { margin-right: 0; }
        /* 工具栏按钮组 */
        .toolbar .btn { font-size: 0.85rem; }
        /* 编辑器分栏布局 */
        .editor-split { display: flex; gap: 0; border: 1px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; min-height: 320px; }
        .editor-split .editor-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .editor-split .editor-pane:first-child { border-right: 1px solid var(--color-border); }
        .editor-split textarea { flex: 1; border: none; border-radius: 0; resize: none; min-height: 280px; padding: 0.75rem; font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.7; background: var(--color-bg); color: var(--color-text); outline: none; }
        .editor-split textarea:focus { box-shadow: inset 0 0 0 2px var(--color-primary); }
        .editor-split .preview-pane { flex: 1; overflow-y: auto; padding: 0.75rem; background: var(--color-surface); font-size: 0.88rem; line-height: 1.7; }
        .editor-split .preview-pane:empty::before { content: '预览区域'; color: var(--color-text-placeholder); font-style: italic; }
        .editor-pane-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); padding: 0.3rem 0.75rem; background: var(--color-bg); border-bottom: 1px solid var(--color-border); user-select: none; }
        .md-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; font-size: 0.75rem; color: var(--color-text-muted); }
        .md-status-bar .auto-save-hint { color: var(--color-success-text); opacity: 0; transition: opacity 0.3s; }
        .md-status-bar .auto-save-hint.show { opacity: 1; }
        @media (max-width: 768px) { .editor-split { flex-direction: column; } .editor-split .editor-pane:first-child { border-right: none; border-bottom: 1px solid var(--color-border); } }
        /* 壁纸选择器 */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 0.75rem;
            margin: 0.75rem 0;
        }
        .wallpaper-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
        }
        .wallpaper-item:hover {
            transform: translateY(-2px);
        }
        .wallpaper-item.active {
            border-color: var(--color-primary);
        }
        .wallpaper-thumb {
            width: 72px;
            height: 48px;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        .wallpaper-item span {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
        }
        .wallpaper-item.active span {
            color: var(--color-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-section" class="login-box">
        <h2>管理员登录</h2>
        <p class="error-msg" id="login-error"></p>
        <input type="password" id="password" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">登录</button>
    </div>

    <!-- 管理界面 -->
    <div id="admin-section" class="admin-wrapper hidden">
        <header class="admin-header">
            <h1>后台管理</h1>
            <div style="display:flex;align-items:center;gap:0.8rem;">
                <button class="theme-toggle" id="theme-toggle" aria-label="切换主题" title="切换日间/夜间模式" style="width:40px;height:40px;">
                    <div class="theme-icon">
                        <div class="theme-icon-sun"></div>
                        <div class="theme-icon-moon"></div>
                    </div>
                </button>
                <button class="btn btn-secondary" onclick="logout()">退出登录</button>
            </div>
        </header>

        <!-- Tab 切换 -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="sites" onclick="switchTab('sites')">网站管理</button>
            <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">页面设置</button>
            <button class="tab-btn" data-tab="articles" onclick="switchTab('articles')">文章管理</button>
        </nav>

        <!-- ========== 网站管理 ========== -->
        <div id="tab-sites" class="tab-content">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openModal()">+ 添加网站</button>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>图标</th>
                        <th>标题</th>
                        <th>网址</th>
                        <th>介绍</th>
                        <th style="width:140px;">操作</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- ========== 页面设置 ========== -->
        <div id="tab-settings" class="tab-content hidden">
            <div class="settings-panel">
                <div class="settings-form">
                    <h3>页面配置</h3>
                    <form id="settings-form" onsubmit="saveSettings(event)">
                        <div class="form-group">
                            <label>页面标题</label>
                            <input type="text" id="set-title" required placeholder="例如：我的导航主页">
                            <p class="form-hint">显示在浏览器标签页和页面顶部</p>
                        </div>
                        <div class="form-group">
                            <label>副标题</label>
                            <input type="text" id="set-subtitle" placeholder="例如：双击卡片即可跳转">
                            <p class="form-hint">显示在标题下方</p>
                        </div>
                        <div class="form-group">
                            <label>页脚文字</label>
                            <input type="text" id="set-footer" placeholder="例如：© 2026">
                            <p class="form-hint">显示在页面底部</p>
                        </div>
                        <div class="form-group">
                            <label>背景壁纸</label>
                            <div class="wallpaper-grid">
                                <div class="wallpaper-item active" data-bg="" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:#faf9f7"></div>
                                    <span>无</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/dawn.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#fdf6f0,#e8d5c4)"></div>
                                    <span>晨曦</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/mist.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#e8edf2,#d0d8e0)"></div>
                                    <span>薄雾</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/ink.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:radial-gradient(#f0ebe6,#d8cec3)"></div>
                                    <span>水墨</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/dusk.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#2c2c2c,#151311)"></div>
                                    <span>黄昏</span>
                                </div>
                                <div class="wallpaper-item" data-bg="/assets/wallpapers/night.svg" onclick="selectWallpaper(this)">
                                    <div class="wallpaper-thumb" style="background:linear-gradient(#1a1820,#100e14)"></div>
                                    <span>深夜</span>
                                </div>
                            </div>
                            <input type="text" id="set-bg-image" placeholder="或输入自定义图片URL">
                            <p class="form-hint">选择预设壁纸或输入外部图片链接</p>
                        </div>
                        <div class="modal-actions">
                            <button type="submit" class="btn btn-primary">保存设置</button>
                        </div>
                    </form>
                    <div class="save-hint" id="save-hint">已保存</div>
                </div>

                <div class="preview-box">
                    <h3>实时预览</h3>
                    <div class="preview-area">
                        <div class="preview-title" id="preview-title">一切从这里开始！</div>
                        <div class="preview-subtitle" id="preview-subtitle">双击卡片即可跳转</div>
                        <div class="preview-cards">
                            <div class="preview-card">
                                <div class="preview-card-icon"></div>
                                <div class="preview-card-title">示例网站</div>
                            </div>
                            <div class="preview-card">
                                <div class="preview-card-icon"></div>
                                <div class="preview-card-title">示例网站</div>
                            </div>
                        </div>
                        <div class="preview-footer" id="preview-footer">© 2026</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 文章管理 ========== -->
    <div id="tab-articles" class="tab-content hidden">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openArticleEditor()">+ 写文章</button>
        </div>
        <div id="article-list-area"></div>
    </div>

    <!-- 文章编辑模态框 -->
    <div class="modal-overlay" id="article-modal">
        <div class="modal" style="max-width:900px;width:95%;max-height:90vh;overflow-y:auto;">
            <h2 id="article-modal-title">写文章</h2>
            <form id="article-form" onsubmit="saveArticle(event)">
                <input type="hidden" id="article-edit-id">
                <div class="form-group"><label>标题 *</label><input type="text" id="article-title" required></div>
                <div class="form-group"><label>Slug（URL 标识，留空自动生成）</label><input type="text" id="article-slug"></div>
                <div class="form-group"><label>摘要</label><input type="text" id="article-summary"></div>
                <div class="form-group"><label>封面图片 URL</label><input type="url" id="article-cover"></div>
                <div class="form-group"><label>正文（Markdown）</label>
                    <div class="md-toolbar" style="display:flex;flex-wrap:wrap;gap:0.25rem;margin-bottom:0.4rem;">
                        <button type="button" class="md-btn" onclick="insertMD('bold')" title="加粗 Ctrl+B"><b>B</b></button>
                        <button type="button" class="md-btn" onclick="insertMD('italic')" title="斜体 Ctrl+I"><i>I</i></button>
                        <button type="button" class="md-btn" onclick="insertMD('strike')" title="删除线"><s>S</s></button>
                        <button type="button" class="md-btn" onclick="insertMD('h1')" title="标题">H1</button>
                        <button type="button" class="md-btn" onclick="insertMD('h2')" title="二级标题">H2</button>
                        <button type="button" class="md-btn" onclick="insertMD('h3')" title="三级标题">H3</button>
                        <button type="button" class="md-btn" onclick="insertMD('quote')" title="引用">「」</button>
                        <button type="button" class="md-btn" onclick="insertMD('ul')" title="无序列表">•</button>
                        <button type="button" class="md-btn" onclick="insertMD('ol')" title="有序列表">1.</button>
                        <button type="button" class="md-btn" onclick="insertMD('code')" title="行内代码">&lt;/&gt;</button>
                        <button type="button" class="md-btn" onclick="insertMD('codeblock')" title="代码块">{ }</button>
                        <button type="button" class="md-btn" onclick="insertMD('link')" title="链接">🔗</button>
                        <button type="button" class="md-btn" onclick="insertMD('image')" title="图片">🖼</button>
                        <button type="button" class="md-btn" onclick="insertMD('table')" title="表格">⊞</button>
                        <button type="button" class="md-btn" onclick="insertMD('hr')" title="分割线">—</button>
                        <span style="flex:1;"></span>
                        <label class="md-btn md-upload" title="上传图片" style="cursor:pointer;background:var(--color-primary-light);color:var(--color-primary);">
                            📷 上传
                            <input type="file" accept="image/*" onchange="uploadMDImage(this)" style="display:none;">
                        </label>
                        <label class="md-btn md-upload" title="导入 Markdown 文件" style="cursor:pointer;background:var(--color-success-bg);color:var(--color-success-text);">
                            📄 导入
                            <input type="file" accept=".md,.txt,.markdown,text/markdown,text/plain" onchange="importMDFile(this)" style="display:none;">
                        </label>
                    </div>
                    <div class="editor-split">
                        <div class="editor-pane">
                            <div class="editor-pane-label">编辑</div>
                            <textarea id="article-content-md" placeholder="支持 Markdown 语法，Ctrl+B 加粗，Ctrl+I 斜体，Ctrl+S 保存"></textarea>
                        </div>
                        <div class="editor-pane">
                            <div class="editor-pane-label">预览</div>
                            <div class="preview-pane" id="article-preview"></div>
                        </div>
                    </div>
                    <div class="md-status-bar">
                        <span id="md-status">就绪</span>
                        <span class="auto-save-hint" id="auto-save-hint">✓ 已自动保存</span>
                    </div>
                </div>
                <div class="form-group"><label>作者</label><input type="text" id="article-author" value="Admin"></div>
                <div class="form-group"><label>标签（逗号分隔）</label><input type="text" id="article-tags"></div>
                <div class="form-group"><label>发布方式</label>
                    <div class="publish-mode-group">
                        <label class="publish-mode-option"><input type="radio" name="publish-mode" value="publish" checked onchange="onPublishModeChange()"> 立即发布</label>
                        <label class="publish-mode-option"><input type="radio" name="publish-mode" value="draft" onchange="onPublishModeChange()"> 保存为草稿</label>
                        <label class="publish-mode-option"><input type="radio" name="publish-mode" value="schedule" onchange="onPublishModeChange()"> 定时发布</label>
                    </div>
                    <div id="schedule-datetime" class="schedule-row" style="display:none;">
                        <input type="datetime-local" id="article-scheduled">
                        <button type="button" class="btn btn-primary btn-sm" onclick="confirmSchedule()">确认定时</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeArticleEditor()">取消</button>
                    <button type="submit" class="btn btn-primary" id="submit-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-title">添加网站</h2>
            <form id="edit-form" onsubmit="saveSite(event)">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>网站标题 *</label>
                    <input type="text" id="edit-title" required placeholder="例如：GitHub">
                </div>
                <div class="form-group">
                    <label>网址 *</label>
                    <input type="url" id="edit-url" required placeholder="https://github.com">
                </div>
                <div class="form-group">
                    <label>图标（可选）</label>
                    <div style="display:flex;align-items:center;gap:0.8rem;">
                        <div id="icon-preview" style="width:48px;height:48px;border-radius:12px;background:var(--color-bg-card-icon);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">🌐</div>
                        <div style="flex:1;min-width:0;">
                            <input type="file" id="edit-icon-file" accept="image/*" style="font-size:0.85rem;" onchange="handleIconFile(this)">
                            <input type="hidden" id="edit-icon" value="">
                            <p class="form-hint" style="margin-top:0.2rem;">上传本地图片作为图标</p>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>简短介绍</label>
                    <textarea id="edit-desc" placeholder="一两句话介绍"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api/sites';
        const API_SETTINGS = '/api/settings';
        const API_AUTH = '/api/auth';
        let token = localStorage.getItem('admin_token') || '';

        // 主题初始化
        (function() {
            var saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            var btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.addEventListener('click', function() {
                    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                    }
                });
            }
        })();

        if (token) {
            verifyAndEnter();
        }

        function verifyAndEnter() {
            fetch(API_AUTH, {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(function(r) {
                if (r.ok) {
                    showAdmin();
                    loadTable();
                } else {
                    localStorage.removeItem('admin_token');
                    token = '';
                }
            });
        }

        function doLogin() {
            const pwd = document.getElementById('password').value.trim();
            if (!pwd) return;
            token = pwd;
            fetch(API_AUTH, {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(function(r) {
                if (!r.ok) {
                    document.getElementById('login-error').textContent = '密码错误';
                    token = '';
                } else {
                    localStorage.setItem('admin_token', token);
                    showAdmin();
                    loadTable();
                }
            }).catch(function() {
                document.getElementById('login-error').textContent = '网络错误';
            });
        }

        function logout() {
            localStorage.removeItem('admin_token');
            token = '';
            location.reload();
        }

        function showAdmin() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
        }

        // ---- Tab 切换 ----
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('hidden', c.id !== 'tab-' + name));
            if (name === 'settings') loadSettings();
            if (name === 'sites') loadTable();
            if (name === 'articles') loadArticles();
        }

        // ---- 网站管理 ----
        async function loadTable() {
            try {
                const res = await fetch(API_BASE);
                const data = await res.json();
                renderTable(data.sites || []);
            } catch (e) {
                document.getElementById('table-body').innerHTML =
                    '<tr><td colspan="5" style="text-align:center">加载失败</td></tr>';
            }
        }

        function renderTable(sites) {
            const tbody = document.getElementById('table-body');
            if (!sites.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-text-placeholder);padding:2rem;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = sites.map(site => {
                let hostname;
                let iconCell;
                if (site.icon) {
                    iconCell = '<img src="' + escapeHtml(site.icon) + '" class="site-icon-preview" onerror="this.style.display=\'none\'; this.parentElement.innerHTML=\'🌐\';">';
                } else {
                    iconCell = '<span style="font-size:1.5rem;">🌐</span>';
                }
                return `
                    <tr>
                        <td>${iconCell}</td>
                        <td>${escapeHtml(site.title)}</td>
                        <td><a href="${escapeHtml(site.url)}" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary);">${escapeHtml(site.url)}</a></td>
                        <td>${escapeHtml(site.description || '')}</td>
                        <td class="actions">
                            <button class="btn btn-secondary btn-sm" onclick="editSite(${site.id})">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSite(${site.id})">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function openModal(id) {
            document.getElementById('modal').classList.add('active');
            document.getElementById('edit-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('edit-icon').value = '';
            document.getElementById('edit-icon-file').value = '';
            document.getElementById('icon-preview').innerHTML = '🌐';
            document.getElementById('modal-title').textContent = id ? '编辑网站' : '添加网站';
            if (id) {
                fetch(API_BASE + '/' + id).then(r => r.json()).then(site => {
                    document.getElementById('edit-id').value = site.id;
                    document.getElementById('edit-title').value = site.title;
                    document.getElementById('edit-url').value = site.url;
                    document.getElementById('edit-icon').value = site.icon || '';
                    document.getElementById('edit-desc').value = site.description || '';
                    updateIconPreview(site.icon);
                });
            }
        }

        function handleIconFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var size = Math.min(img.width, img.height);
                    canvas.width = 64; canvas.height = 64;
                    var ctx = canvas.getContext('2d');
                    var sx = (img.width - size) / 2;
                    var sy = (img.height - size) / 2;
                    ctx.drawImage(img, sx, sy, size, size, 0, 0, 64, 64);
                    var base64 = canvas.toDataURL('image/png', 0.7);
                    document.getElementById('edit-icon').value = base64;
                    updateIconPreview(base64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateIconPreview(src) {
            var preview = document.getElementById('icon-preview');
            if (src && src.startsWith('data:')) {
                preview.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">';
            } else if (src && src.startsWith('http')) {
                preview.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.parentElement.innerHTML=\'🌐\';">';
            } else {
                preview.innerHTML = '🌐';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function saveSite(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const body = {
                title: document.getElementById('edit-title').value.trim(),
                url: document.getElementById('edit-url').value.trim(),
                icon: document.getElementById('edit-icon').value.trim(),
                description: document.getElementById('edit-desc').value.trim()
            };
            const url = id ? API_BASE + '/' + id : API_BASE + '/new';
            const res = await fetch(url, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(body)
            });
            if (res.ok) { closeModal(); loadTable(); }
            else if (res.status === 401) { alert('登录已过期'); logout(); }
            else { alert('保存失败'); }
        }

        function editSite(id) { openModal(id); }

        async function deleteSite(id) {
            if (!confirm('确定删除？')) return;
            const res = await fetch(API_BASE + '/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) loadTable();
            else if (res.status === 401) { alert('登录已过期'); logout(); }
        }

        // ---- 页面设置 ----
        async function loadSettings() {
            try {
                const res = await fetch(API_SETTINGS);
                const data = await res.json();
                document.getElementById('set-title').value = data.title || '';
                document.getElementById('set-subtitle').value = data.subtitle || '';
                document.getElementById('set-footer').value = data.footer || '';
                var bg = data.bg_image || '';
                document.getElementById('set-bg-image').value = bg;
                // 激活对应壁纸项
                document.querySelectorAll('.wallpaper-item').forEach(function(el) {
                    el.classList.toggle('active', el.dataset.bg === bg);
                });
                updatePreview();
            } catch (e) { /* ignore */ }
        }

        function updatePreview() {
            document.getElementById('preview-title').textContent = document.getElementById('set-title').value || '我的导航主页';
            document.getElementById('preview-subtitle').textContent = document.getElementById('set-subtitle').value || '';
            document.getElementById('preview-footer').textContent = document.getElementById('set-footer').value || '';
        }

        // 处理中文输入法：composition 期间不更新，等输入法确认后再刷新
        var composing = false;
        ['set-title', 'set-subtitle', 'set-footer'].forEach(function(id) {
            var el = document.getElementById(id);
            el.addEventListener('compositionstart', function() { composing = true; });
            el.addEventListener('compositionend', function() {
                composing = false;
                updatePreview();
            });
            el.addEventListener('input', function() {
                if (!composing) updatePreview();
            });
        });

        function selectWallpaper(el) {
            document.querySelectorAll('.wallpaper-item').forEach(function(item) {
                item.classList.remove('active');
            });
            el.classList.add('active');
            document.getElementById('set-bg-image').value = el.dataset.bg || '';
        }

        async function saveSettings(e) {
            e.preventDefault();
            var bgVal = document.getElementById('set-bg-image').value.trim();
            // 如果有预设选中且自定义为空，用预设值
            if (!bgVal) {
                var active = document.querySelector('.wallpaper-item.active');
                if (active) bgVal = active.dataset.bg || '';
            }
            const body = {
                title: document.getElementById('set-title').value.trim(),
                subtitle: document.getElementById('set-subtitle').value.trim(),
                footer: document.getElementById('set-footer').value.trim(),
                bg_image: bgVal
            };
            const res = await fetch(API_SETTINGS, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                const hint = document.getElementById('save-hint');
                hint.classList.add('show');
                setTimeout(function() { hint.classList.remove('show'); }, 2000);
            } else if (res.status === 401) {
                alert('登录已过期'); logout();
            } else {
                alert('保存失败');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // ---- 文章管理 ----
        async function loadArticles() {
            try {
                var res = await fetch('/api/articles?all=1');
                var data = await res.json();
                renderArticleList(data.articles || []);
            } catch(e) {
                document.getElementById('article-list-area').innerHTML = '<p style="text-align:center;color:var(--color-danger);padding:2rem;">加载失败</p>';
            }
        }

        function isArticlePublished(a) {
            if (a.scheduled_at) {
                var sd = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
                return sd <= new Date() ? true : false;
            }
            return !!a.is_published;
        }

        function isArticleScheduled(a) {
            if (!a.scheduled_at) return false;
            var sd = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
            return sd > new Date();
        }

        function formatArticleStatus(a) {
            if (isArticleScheduled(a)) {
                var sd = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
                return '<span class="status-tag status-scheduled">⏰ ' + sd.toLocaleDateString('zh-CN') + ' ' + sd.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</span>';
            }
            if (a.is_published) return '<span class="status-tag status-published">● 已发布</span>';
            return '<span class="status-tag status-draft">○ 草稿</span>';
        }

        function buildArticleRow(a) {
            var time = (a.created_at || '').slice(0, 10);
            return '<tr><td><strong>' + escapeHtml(a.title) + '</strong></td><td>' + escapeHtml(a.author) + '</td><td>' + formatArticleStatus(a) + '</td><td>' + escapeHtml(a.tags||'') + '</td><td>' + time + '</td><td class="actions"><button class="btn btn-secondary btn-sm" onclick="editArticle(' + a.id + ')">编辑</button><button class="btn btn-danger btn-sm" onclick="deleteArticle(' + a.id + ')">删除</button></td></tr>';
        }

        function renderArticleList(articles) {
            var area = document.getElementById('article-list-area');
            if (!articles.length) {
                area.innerHTML = '<p style="text-align:center;color:var(--color-text-placeholder);padding:2rem;">暂无文章，点击上方按钮写一篇</p>';
                return;
            }

            var published = [], drafts = [];
            for (var i = 0; i < articles.length; i++) {
                if (isArticlePublished(articles[i]) || isArticleScheduled(articles[i])) {
                    published.push(articles[i]);
                } else {
                    drafts.push(articles[i]);
                }
            }

            var html = '';
            var thead = '<thead><tr><th>标题</th><th>作者</th><th>状态</th><th>标签</th><th>日期</th><th style="width:140px;">操作</th></tr></thead>';

            // 已发布 + 定时发布
            html += '<div class="article-section"><div class="article-section-title">已发布 <span class="count">' + published.length + '</span></div>';
            if (published.length) {
                html += '<table class="data-table">' + thead + '<tbody>' + published.map(buildArticleRow).join('') + '</tbody></table>';
            } else {
                html += '<p class="empty-hint">暂无已发布文章</p>';
            }
            html += '</div>';

            // 草稿
            html += '<div class="article-section"><div class="article-section-title">草稿 <span class="count">' + drafts.length + '</span></div>';
            if (drafts.length) {
                html += '<table class="data-table">' + thead + '<tbody>' + drafts.map(buildArticleRow).join('') + '</tbody></table>';
            } else {
                html += '<p class="empty-hint">暂无草稿</p>';
            }
            html += '</div>';

            area.innerHTML = html;
        }

        function confirmSchedule() {
            var scheduledVal = document.getElementById('article-scheduled').value;
            if (!scheduledVal) { alert('请先选择发布时间'); return; }
            document.getElementById('article-form').requestSubmit();
        }

        function openArticleEditor(id) {
            document.getElementById('article-modal').classList.add('active');
            document.getElementById('article-form').reset();
            document.getElementById('article-edit-id').value = '';
            document.getElementById('article-preview').innerHTML = '';
            document.getElementById('article-modal-title').textContent = '写文章';
            setPublishMode('publish');

            if (id) {
                // 编辑已有文章
                document.getElementById('article-modal-title').textContent = '编辑文章';
                fetch('/api/articles/' + id).then(function(r){return r.json();}).then(function(a){
                    document.getElementById('article-edit-id').value = a.id;
                    document.getElementById('article-title').value = a.title || '';
                    document.getElementById('article-slug').value = a.slug || '';
                    document.getElementById('article-summary').value = a.summary || '';
                    document.getElementById('article-cover').value = a.cover_image || '';
                    document.getElementById('article-content-md').value = a.content_md || '';
                    document.getElementById('article-author').value = a.author || 'Admin';
                    document.getElementById('article-tags').value = a.tags || '';
                    // 设置发布方式
                    if (a.scheduled_at) {
                        var d = new Date(a.scheduled_at + (a.scheduled_at.includes('Z') ? '' : 'Z'));
                        var pad = function(n) { return n < 10 ? '0' + n : n; };
                        document.getElementById('article-scheduled').value = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
                        setPublishMode('schedule');
                    } else if (a.is_published) {
                        setPublishMode('publish');
                    } else {
                        setPublishMode('draft');
                    }
                    updateArticlePreview();
                    document.getElementById('article-content-md').focus();
                });
            } else {
                // 新建文章：自动恢复未保存的草稿
                var draft = loadDraft();
                if (draft && draft.content) {
                    restoreDraft(draft);
                }
            }
        }

        function closeArticleEditor() {
            document.getElementById('article-modal').classList.remove('active');
            // 关闭时如果有内容，自动保存一次草稿
            var content = document.getElementById('article-content-md').value;
            if (content) scheduleAutoSave();
        }

        function onPublishModeChange() {
            var radios = document.querySelectorAll('input[name="publish-mode"]');
            var mode = '';
            for (var i = 0; i < radios.length; i++) {
                radios[i].closest('.publish-mode-option').classList.toggle('active', radios[i].checked);
                if (radios[i].checked) mode = radios[i].value;
            }
            document.getElementById('schedule-datetime').style.display = mode === 'schedule' ? 'block' : 'none';
            if (mode !== 'schedule') document.getElementById('article-scheduled').value = '';
        }

        function getPublishMode() {
            return document.querySelector('input[name="publish-mode"]:checked').value;
        }

        function setPublishMode(mode) {
            var radios = document.querySelectorAll('input[name="publish-mode"]');
            for (var i = 0; i < radios.length; i++) {
                radios[i].checked = radios[i].value === mode;
                radios[i].closest('.publish-mode-option').classList.toggle('active', radios[i].value === mode);
            }
            onPublishModeChange();
        }

        async function saveArticle(e) {
            e.preventDefault();
            var id = document.getElementById('article-edit-id').value;
            var mode = getPublishMode();
            var scheduledVal = document.getElementById('article-scheduled').value;
            var body = {
                title: document.getElementById('article-title').value.trim(),
                slug: document.getElementById('article-slug').value.trim(),
                summary: document.getElementById('article-summary').value.trim(),
                cover_image: document.getElementById('article-cover').value.trim(),
                content_md: document.getElementById('article-content-md').value,
                author: document.getElementById('article-author').value.trim(),
                tags: document.getElementById('article-tags').value.trim(),
                is_published: mode === 'publish' ? 1 : 0,
                scheduled_at: mode === 'schedule' && scheduledVal ? scheduledVal : null
            };
            var url = id ? '/api/articles/' + id : '/api/articles';
            var res = await fetch(url, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(body)
            });
            if (res.ok) { clearDraft(); closeArticleEditor(); loadArticles(); }
            else if (res.status === 401) { alert('登录已过期'); logout(); }
            else { alert('保存失败: ' + ((await res.json()).error || '')); }
        }

        async function deleteArticle(id) {
            if (!confirm('确定删除这篇文章？相关评论和点赞也会被删除。')) return;
            var res = await fetch('/api/articles/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) loadArticles();
            else if (res.status === 401) { alert('登录已过期'); logout(); }
        }

        function editArticle(id) { openArticleEditor(id); }

        // Markdown 快速插入
        // 工具栏命令表：before=前缀, after=后缀, placeholder=无选中时的占位文本
        // block=true 表示行级命令（标题/列表/引用等），需要确保在行首
        var MD_CMDS = {
            bold:       { before: '**',     after: '**',        ph: '加粗文字',   inline: true },
            italic:     { before: '*',      after: '*',         ph: '斜体文字',   inline: true },
            strike:     { before: '~~',     after: '~~',        ph: '删除线文字', inline: true },
            code:       { before: '`',      after: '`',         ph: '代码',       inline: true },
            link:       { before: '[',      after: '](url)',    ph: '链接文字',   inline: true },
            image:      { before: '![',     after: '](url)',    ph: '图片描述',   inline: true },
            h1:         { before: '# ',     after: '',          ph: '标题',       block: true },
            h2:         { before: '## ',    after: '',          ph: '二级标题',   block: true },
            h3:         { before: '### ',   after: '',          ph: '三级标题',   block: true },
            quote:      { before: '> ',     after: '',          ph: '引用内容',   block: true },
            ul:         { before: '- ',     after: '',          ph: '列表项',     block: true },
            ol:         { before: '1. ',    after: '',          ph: '列表项',     block: true },
            codeblock:  { before: '```\n',  after: '\n```',     ph: '代码',       block: true },
            table:      { before: '| 列1 | 列2 |\n| ----- | ----- |\n| ', after: ' |\n', ph: '内容', block: true },
            hr:         { before: '\n---\n', after: '',         ph: '',           block: true }
        };

        // ── 撤销栈：解决直接设 ta.value 不进浏览器撤销栈的问题 ──
        var _undoStack = [];
        var _redoStack = [];
        var _lastSavedValue = null;

        function _saveUndoState(ta) {
            var current = ta.value;
            // 避免重复保存相同内容
            if (current === _lastSavedValue) return;
            _undoStack.push({ value: current, selStart: ta.selectionStart, selEnd: ta.selectionEnd });
            if (_undoStack.length > 50) _undoStack.shift(); // 最多 50 步
            _redoStack = []; // 新操作清空 redo 栈
            _lastSavedValue = current;
        }

        function _undo(ta) {
            if (!_undoStack.length) return;
            // 保存当前状态到 redo 栈
            _redoStack.push({ value: ta.value, selStart: ta.selectionStart, selEnd: ta.selectionEnd });
            var state = _undoStack.pop();
            ta.value = state.value;
            ta.selectionStart = state.selStart;
            ta.selectionEnd = state.selEnd;
            _lastSavedValue = state.value;
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function _redo(ta) {
            if (!_redoStack.length) return;
            _undoStack.push({ value: ta.value, selStart: ta.selectionStart, selEnd: ta.selectionEnd });
            var state = _redoStack.pop();
            ta.value = state.value;
            ta.selectionStart = state.selStart;
            ta.selectionEnd = state.selEnd;
            _lastSavedValue = state.value;
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function insertMD(type) {
            var cmd = MD_CMDS[type];
            if (!cmd) { console.warn('Unknown MD command:', type); return; }
            var ta = document.getElementById('article-content-md');
            if (!ta) { console.error('Textarea not found'); return; }

            // 核心：先聚焦 textarea，确保 selectionStart/End 可靠
            ta.focus();

            // 等焦点稳定后再操作（解决某些浏览器的异步焦点问题）
            requestAnimationFrame(function() {
                try {
                    var s = ta.selectionStart, e = ta.selectionEnd;
                    var val = ta.value;
                    var sel = val.substring(s, e);
                    var hasSel = s !== e;
                    var text = sel || cmd.ph;
                    var result;

                    if (cmd.block) {
                        // ── block 级命令（标题/列表/引用/代码块等）──
                        var ls = val.lastIndexOf('\n', s - 1) + 1;
                        var lineBefore = val.substring(ls, s);

                        if (hasSel && sel.indexOf('\n') !== -1) {
                            // 多行选区：每行加前缀
                            result = sel.split('\n').map(function(l) { return cmd.before + l; }).join('\n') + cmd.after;
                        } else if (lineBefore.trim() === '') {
                            // 行首：直接插入
                            result = cmd.before + text + cmd.after;
                        } else {
                            // 行中间：先换行再插入
                            result = '\n' + cmd.before + text + cmd.after;
                        }
                    } else {
                        // ── inline 级命令（加粗/斜体/代码/链接等）──
                        result = cmd.before + text + cmd.after;
                    }

                    // 保存撤销状态
                    _saveUndoState(ta);

                    // 直接拼接 value（比 setRangeText 跨浏览器兼容性更好）
                    var newVal = val.substring(0, s) + result + val.substring(e);
                    ta.value = newVal;

                    // 设置光标位置
                    if (cmd.inline && !hasSel) {
                        // inline 无选区：选中占位文本，方便用户直接打字替换
                        ta.selectionStart = s + cmd.before.length;
                        ta.selectionEnd = s + cmd.before.length + text.length;
                    } else {
                        // 其他情况：光标放在插入内容末尾
                        ta.selectionStart = ta.selectionEnd = s + result.length;
                    }

                    // 手动触发 input 事件（直接改 value 不会自动触发）
                    ta.dispatchEvent(new Event('input', { bubbles: true }));

                } catch(err) {
                    console.error('insertMD error:', err);
                    alert('工具栏操作失败: ' + err.message);
                }
            });
        }

        // 图片上传并插入 base64
        function uploadMDImage(input) {
            var file = input.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { alert('图片不能超过 5MB'); input.value = ''; return; }
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var maxW = 1200, maxH = 800;
                    var w = img.width, h = img.height;
                    if (w > maxW) { h = h * maxW / w; w = maxW; }
                    if (h > maxH) { w = w * maxH / h; h = maxH; }
                    canvas.width = Math.round(w); canvas.height = Math.round(h);
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    var base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1]; // 去掉 data:xxx;base64, 前缀
                    uploadToServer(file.name, 'image/jpeg', base64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        async function uploadToServer(filename, mime, data) {
            try {
                var res = await fetch('/api/images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ filename: filename, mime_type: mime, data: data })
                });
                if (res.ok) {
                    var result = await res.json();
                    var mdImg = '\n![' + filename + '](' + result.url + ')\n';
                    var ta = document.getElementById('article-content-md');
                    ta.focus();
                    _saveUndoState(ta);
                    var pos = ta.selectionStart;
                    ta.value = ta.value.substring(0, pos) + mdImg + ta.value.substring(ta.selectionEnd);
                    ta.selectionStart = ta.selectionEnd = pos + mdImg.length;
                    ta.dispatchEvent(new Event('input', { bubbles: true }));
                } else {
                    alert('图片上传失败');
                }
            } catch(e) {
                alert('图片上传失败: ' + e.message);
            }
        }

        function updateArticlePreview() {
            var md = document.getElementById('article-content-md').value || '';
            var chars = md.length;
            var words = md.trim() ? md.trim().split(/\s+/).length : 0;
            document.getElementById('md-status').textContent = chars + ' 字符 · ' + words + ' 词';
            var preview = document.getElementById('article-preview');
            if (!md) { preview.innerHTML = ''; return; }
            try {
                if (typeof marked !== 'undefined' && marked.parse) {
                    preview.innerHTML = marked.parse(md);
                } else {
                    preview.innerHTML = '<em style="color:var(--color-text-muted);">marked.js 加载中...</em>';
                    setTimeout(updateArticlePreview, 300);
                }
            } catch(e) {
                preview.innerHTML = '<em style="color:var(--color-danger);">Markdown 解析错误</em>';
            }
        }

        // ── 自动保存 ──
        var _autoSaveTimer = null;
        var AUTOSAVE_KEY = 'ayoo_draft';

        function scheduleAutoSave() {
            clearTimeout(_autoSaveTimer);
            _autoSaveTimer = setTimeout(autoSave, 300);
        }

        function autoSave() {
            var mode = getPublishMode();
            var data = {
                title: document.getElementById('article-title').value,
                slug: document.getElementById('article-slug').value,
                summary: document.getElementById('article-summary').value,
                cover: document.getElementById('article-cover').value,
                content: document.getElementById('article-content-md').value,
                author: document.getElementById('article-author').value,
                tags: document.getElementById('article-tags').value,
                published: mode === 'publish',
                scheduled: document.getElementById('article-scheduled').value,
                ts: Date.now()
            };
            try {
                localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
                var hint = document.getElementById('auto-save-hint');
                hint.classList.add('show');
                setTimeout(function() { hint.classList.remove('show'); }, 1500);
            } catch(e) { /* localStorage 满了就忽略 */ }
        }

        function loadDraft() {
            try {
                var raw = localStorage.getItem(AUTOSAVE_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch(e) { return null; }
        }

        function clearDraft() {
            localStorage.removeItem(AUTOSAVE_KEY);
        }

        function restoreDraft(draft) {
            if (!draft) return;
            // 不恢复 editId，避免新建文章时误更新旧文章
            document.getElementById('article-edit-id').value = '';
            document.getElementById('article-title').value = draft.title || '';
            document.getElementById('article-slug').value = draft.slug || '';
            document.getElementById('article-summary').value = draft.summary || '';
            document.getElementById('article-cover').value = draft.cover || '';
            document.getElementById('article-content-md').value = draft.content || '';
            document.getElementById('article-author').value = draft.author || 'Admin';
            document.getElementById('article-tags').value = draft.tags || '';
            if (draft.scheduled) {
                document.getElementById('article-scheduled').value = draft.scheduled;
                setPublishMode('schedule');
            } else if (draft.published === false) {
                setPublishMode('draft');
            } else {
                setPublishMode('publish');
            }
            document.getElementById('article-content-md').dispatchEvent(new Event('input', { bubbles: true }));
        }

        // 监听所有表单字段的输入，触发自动保存
        function bindAutoSaveListeners() {
            var fields = ['article-title','article-slug','article-summary','article-cover','article-content-md','article-author','article-tags','article-scheduled'];
            fields.forEach(function(id) {
                var el = document.getElementById(id);
                if (!el) return;
                if (id === 'article-content-md') {
                    // textarea 同时触发预览更新 + 自动保存
                    el.addEventListener('input', function() { updateArticlePreview(); scheduleAutoSave(); });
                } else {
                    el.addEventListener('input', scheduleAutoSave);
                }
            });
            // 监听发布方式单选按钮
            var radios = document.querySelectorAll('input[name="publish-mode"]');
            for (var i = 0; i < radios.length; i++) {
                radios[i].addEventListener('change', scheduleAutoSave);
            }
        }

        // 导入 .md 文件
        function importMDFile(input) {
            var file = input.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert('文件不能超过 2MB'); input.value = ''; return; }
            var reader = new FileReader();
            reader.onload = function(e) {
                var ta = document.getElementById('article-content-md');
                var existing = ta.value;
                if (existing && !confirm('当前编辑器已有内容，导入会覆盖。确定继续？')) { input.value = ''; return; }
                ta.value = e.target.result;
                ta.dispatchEvent(new Event('input', { bubbles: true }));
                var titleEl = document.getElementById('article-title');
                if (!titleEl.value) {
                    var name = file.name.replace(/\.(md|txt|markdown)$/i, '');
                    titleEl.value = name;
                    document.getElementById('article-slug').value = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                }
                updateArticlePreview();
                scheduleAutoSave();
            };
            reader.readAsText(file);
            input.value = '';
        }

        // textarea 输入监听（合并到 bindAutoSaveListeners 统一管理，避免重复绑定）

        // 键盘快捷键（只在编辑器打开时生效）
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('article-modal').classList.contains('active')) return;
            var mod = e.ctrlKey || e.metaKey;
            if (!mod) return;
            var k = e.key.toLowerCase();
            if (k === 'z' && !e.shiftKey) {
                // Ctrl+Z：撤销（用自定义栈覆盖浏览器原生行为）
                e.preventDefault();
                var ta = document.getElementById('article-content-md');
                if (ta && document.activeElement === ta) _undo(ta);
            } else if ((k === 'z' && e.shiftKey) || k === 'y') {
                // Ctrl+Shift+Z 或 Ctrl+Y：重做
                e.preventDefault();
                var ta = document.getElementById('article-content-md');
                if (ta && document.activeElement === ta) _redo(ta);
            } else if (k === 'b') { e.preventDefault(); insertMD('bold'); }
            else if (k === 'i') { e.preventDefault(); insertMD('italic'); }
            else if (k === 'd') { e.preventDefault(); insertMD('code'); }
            else if (k === 'k') { e.preventDefault(); insertMD('link'); }
            else if (k === 's') { e.preventDefault(); document.getElementById('article-form').requestSubmit(); }
        });

        bindAutoSaveListeners();

        document.getElementById('article-modal').addEventListener('click', function(e) {
            if (e.target.id === 'article-modal') closeArticleEditor();
        });

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
