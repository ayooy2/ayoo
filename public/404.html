<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 - 页面未找到</title>
<link rel="stylesheet" href="/style.css?v=4">
<style>
    .error-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; padding:2rem; }
    .error-code { font-size:6rem; font-weight:700; color:var(--text-placeholder); line-height:1; margin-bottom:1rem; }
    .error-msg { font-size:1.2rem; color:var(--text-secondary); margin-bottom:2rem; }
    .error-link { color:var(--accent-text); text-decoration:underline; font-size:0.95rem; }
    .error-link:hover { color:var(--accent); }
</style>
</head>
<body>
<div class="error-page">
    <div class="error-code">404</div>
    <p class="error-msg">页面不存在或已被移除</p>
    <a href="/" class="error-link">← 返回首页</a>
</div>
<script src="/app.js"></script>
</body>
</html>
