<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理员登录</title>
<link rel="stylesheet" href="/style.css?v=6">
<style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .login-box {
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 2.5rem;
        width: 100%;
        max-width: 380px;
        text-align: center;
    }
    .login-box h2 { margin:0 0 1.5rem; font-size:1.4rem; }
    .login-box input {
        width: 100%;
        padding: 0.7rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        background: var(--color-bg);
        color: var(--color-text);
        font-size: 0.95rem;
        margin-bottom: 1rem;
        box-sizing: border-box;
    }
    .login-box input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-subtle); }
    .pw-input-wrap { position:relative; display:flex; align-items:center; }
    .pw-input-wrap input { padding-right:3.2rem; }
    .login-box button {
        width: 100%;
        padding: 0.7rem;
        background: var(--color-primary);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
    }
    .login-box button:hover { background: var(--color-primary-hover); }
    .login-box .pw-toggle { width:auto; padding:0.2rem 0.4rem; background:none; color:var(--color-text-muted); position:absolute; right:0.5rem; top:50%; transform:translateY(-50%); font-size:0.78rem; border:none; border-radius:4px; }
    .login-box .pw-toggle:hover { background:var(--color-primary-light); color:var(--color-primary); }
    .error-msg { color:#ef4444; font-size:0.85rem; margin-bottom:0.8rem; display:none; }
    .error-msg.show { display:block; }
</style>
</head>
<body>
    <div class="login-box">
        <h2>管理员登录</h2>
        <p class="error-msg" id="login-error"></p>
        <div class="pw-input-wrap" style="margin-bottom:1rem;">
            <input type="password" id="password" placeholder="请输入管理密码" autofocus onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:0;">
            <button type="button" class="pw-toggle" onclick="togglePw(this)">显示</button>
        </div>
        <button onclick="doLogin()">登录</button>
    </div>
    <script>
        (function() {
            var saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();

        function togglePw(btn) {
            var inp = btn.parentElement.querySelector('input');
            if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '隐藏'; }
            else { inp.type = 'password'; btn.textContent = '显示'; }
        }

        function doLogin() {
            var pwd = document.getElementById('password').value.trim();
            if (!pwd) {
                var errEl = document.getElementById('login-error');
                errEl.textContent = '请输入密码';
                errEl.classList.add('show');
                return;
            }
            var btn = document.querySelector('.login-box button[type="button"], .login-box button:not([type])');
            var errEl = document.getElementById('login-error');
            errEl.classList.remove('show');
            if(btn){btn.disabled=true;btn.textContent='登录中...';}
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            }).then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
            .then(function(result) {
                if (!result.ok) {
                    errEl.textContent = result.data.error || '密码错误';
                    errEl.classList.add('show');
                } else {
                    window.location.href = '/admin.html';
                }
            }).catch(function() {
                errEl.textContent = '网络错误，请重试';
                errEl.classList.add('show');
            }).finally(function(){if(btn){btn.disabled=false;btn.textContent='登录';}});
        }
    </script>
</body>
</html>
