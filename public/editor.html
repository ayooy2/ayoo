<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章编辑器</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link rel="stylesheet" href="editor.css">
</head>
<body>
    <!-- ========== 顶栏 ========== -->
    <header id="editor-header">
        <div class="eh-left">
            <button id="editor-back" class="eh-btn" title="返回">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <span id="editor-title-preview" class="eh-title-preview">新文章</span>
        </div>
        <div class="eh-right">
            <span id="editor-save-status" class="eh-save-status">未保存</span>
            <div class="eh-publish-wrap">
                <button id="editor-publish-btn" class="btn btn-primary eh-publish-btn">
                    发布
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div id="publish-dropdown" class="eh-publish-dropdown">
                    <button class="eh-dropdown-item" data-action="publish">
                        <span class="eh-dropdown-icon">&#9679;</span> 立即发布
                    </button>
                    <button class="eh-dropdown-item" data-action="draft">
                        <span class="eh-dropdown-icon">&#9675;</span> 保存草稿
                    </button>
                    <button class="eh-dropdown-item" data-action="schedule">
                        <span class="eh-dropdown-icon">&#9201;</span> 定时发布
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ========== 主体 ========== -->
    <div id="editor-body">
        <!-- 左侧编辑区 -->
        <div id="editor-main">
            <input type="text" id="editor-title" placeholder="文章标题" autocomplete="off" spellcheck="false">
            <div id="editor-slug-display" class="eh-slug-display" title="点击编辑 Slug">
                <span id="slug-text">/  slug 将自动生成</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            </div>
            <input type="text" id="editor-slug-input" class="eh-slug-input hidden" placeholder="自定义 slug" autocomplete="off" spellcheck="false">

            <!-- Markdown 工具栏 -->
            <div id="editor-toolbar" class="eh-toolbar">
                <button class="eh-tool-btn" data-action="bold" title="加粗 (Ctrl+B)"><b>B</b></button>
                <button class="eh-tool-btn" data-action="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
                <button class="eh-tool-btn" data-action="strike" title="删除线"><s>S</s></button>
                <button class="eh-tool-btn" data-action="h2" title="标题">H2</button>
                <button class="eh-tool-btn" data-action="h3" title="小标题">H3</button>
                <button class="eh-tool-btn" data-action="quote" title="引用">&ldquo;</button>
                <button class="eh-tool-btn" data-action="code" title="代码块">&lt;/&gt;</button>
                <button class="eh-tool-btn" data-action="link" title="链接">&#128279;</button>
                <span class="eh-toolbar-spacer"></span>
                <label class="eh-tool-btn eh-upload-btn" title="上传图片">
                    &#128247;
                    <input type="file" accept="image/*" id="editor-upload-image" style="display:none;">
                </label>
            </div>

            <!-- 编辑区 -->
            <textarea id="editor-content" placeholder="开始写作...  支持 Markdown 语法&#10;&#10;输入 / 唤起快捷命令" spellcheck="false"></textarea>
        </div>

        <!-- 右侧边栏 -->
        <div id="editor-sidebar">
            <!-- 文章状态 -->
            <div class="es-section">
                <div class="es-section-title">文章状态</div>
                <div id="article-status-display" class="es-status-badge es-status-draft">草稿</div>
            </div>

            <!-- SEO 设置 -->
            <div class="es-section">
                <div class="es-section-title">SEO 设置</div>
                <div class="es-field">
                    <label>Slug</label>
                    <input type="text" id="sidebar-slug" placeholder="url-friendly-slug" autocomplete="off" spellcheck="false">
                </div>
                <div class="es-field">
                    <label>摘要</label>
                    <textarea id="sidebar-summary" rows="3" placeholder="文章摘要，用于 SEO 和列表展示"></textarea>
                </div>
            </div>

            <!-- 标签选择器 -->
            <div class="es-section">
                <div class="es-section-title">标签</div>
                <div class="es-tag-input-wrap">
                    <input type="text" id="sidebar-tags-input" placeholder="输入标签后回车" autocomplete="off" spellcheck="false">
                    <button type="button" id="sidebar-tag-pick" class="es-tag-pick-btn" title="选择已有标签">&#9660;</button>
                </div>
                <div id="tag-selector-panel" class="es-tag-selector hidden"></div>
                <div id="sidebar-tag-chips" class="es-tag-chips"></div>
            </div>

            <!-- 封面图片 -->
            <div class="es-section">
                <div class="es-section-title">封面图片</div>
                <div class="es-cover-preview" id="cover-preview">
                    <span>无封面</span>
                </div>
                <input type="text" id="sidebar-cover" placeholder="输入封面图片 URL" autocomplete="off">
                <label class="es-cover-upload">
                    上传封面
                    <input type="file" accept="image/*" id="sidebar-cover-upload" style="display:none;">
                </label>
            </div>

            <!-- 发布选项 -->
            <div class="es-section">
                <div class="es-section-title">发布选项</div>
                <div class="es-field">
                    <label>作者</label>
                    <input type="text" id="sidebar-author" value="Admin" autocomplete="off">
                </div>
                <div id="schedule-section" class="es-field hidden">
                    <label>定时发布</label>
                    <input type="datetime-local" id="sidebar-schedule">
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 状态栏 ========== -->
    <div id="editor-statusbar">
        <span id="sb-words">0 字</span>
        <span class="sb-sep">|</span>
        <span id="sb-reading-time">约 0 分钟</span>
        <span class="sb-sep">|</span>
        <span id="sb-last-edit">最后编辑：--</span>
        <span class="sb-spacer"></span>
        <button id="sb-sidebar-toggle" class="sb-btn" title="切换侧栏">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
    </div>

    <!-- ========== 浮动工具栏（选中文字后出现） ========== -->
    <div id="floating-toolbar" class="eh-floating-toolbar hidden">
        <button class="eh-float-btn" data-action="bold" title="加粗"><b>B</b></button>
        <button class="eh-float-btn" data-action="italic" title="斜体"><i>I</i></button>
        <button class="eh-float-btn" data-action="strike" title="删除线"><s>S</s></button>
        <button class="eh-float-btn" data-action="code" title="代码">&lt;/&gt;</button>
        <button class="eh-float-btn" data-action="link" title="链接">&#128279;</button>
    </div>

    <!-- ========== 斜杠命令菜单 ========== -->
    <div id="slash-menu" class="eh-slash-menu hidden">
        <div class="eh-slash-header">快捷命令</div>
        <button class="eh-slash-item" data-cmd="h2"><span class="eh-slash-icon">H2</span><span class="eh-slash-label">二级标题</span></button>
        <button class="eh-slash-item" data-cmd="h3"><span class="eh-slash-icon">H3</span><span class="eh-slash-label">三级标题</span></button>
        <button class="eh-slash-item" data-cmd="quote"><span class="eh-slash-icon">&ldquo;</span><span class="eh-slash-label">引用</span></button>
        <button class="eh-slash-item" data-cmd="codeblock"><span class="eh-slash-icon">{ }</span><span class="eh-slash-label">代码块</span></button>
        <button class="eh-slash-item" data-cmd="ul"><span class="eh-slash-icon">&bull;</span><span class="eh-slash-label">无序列表</span></button>
        <button class="eh-slash-item" data-cmd="ol"><span class="eh-slash-icon">1.</span><span class="eh-slash-label">有序列表</span></button>
        <button class="eh-slash-item" data-cmd="hr"><span class="eh-slash-icon">&mdash;</span><span class="eh-slash-label">分割线</span></button>
        <button class="eh-slash-item" data-cmd="table"><span class="eh-slash-icon">&#9638;</span><span class="eh-slash-label">表格</span></button>
        <button class="eh-slash-item" data-cmd="image"><span class="eh-slash-icon">&#128247;</span><span class="eh-slash-label">图片</span></button>
        <button class="eh-slash-item" data-cmd="link"><span class="eh-slash-icon">&#128279;</span><span class="eh-slash-label">链接</span></button>
    </div>

    <!-- ========== 移动端底部工具栏 ========== -->
    <div id="mobile-toolbar" class="eh-mobile-toolbar">
        <button class="eh-mt-btn" data-action="bold" title="加粗"><b>B</b></button>
        <button class="eh-mt-btn" data-action="italic" title="斜体"><i>I</i></button>
        <button class="eh-mt-btn" data-action="heading" title="标题">H</button>
        <button class="eh-mt-btn" data-action="quote" title="引用">&ldquo;</button>
        <button class="eh-mt-btn" data-action="code" title="代码">&lt;/&gt;</button>
        <button class="eh-mt-btn" data-action="link" title="链接">&#128279;</button>
        <button class="eh-mt-btn" data-action="image" title="图片">&#128247;</button>
        <button class="eh-mt-btn eh-mt-publish" data-action="publish" title="发布">&#10003;</button>
    </div>

    <!-- ========== 定时发布对话框 ========== -->
    <div id="schedule-dialog-overlay" class="modal-overlay">
        <div class="modal" style="max-width:380px;">
            <h3>定时发布</h3>
            <div class="form-group">
                <label>发布时间</label>
                <input type="datetime-local" id="schedule-dialog-time">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="schedule-dialog-cancel">取消</button>
                <button type="button" class="btn btn-primary" id="schedule-dialog-confirm">确认定时</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="editor.js"></script>
</body>
</html>
