<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="main-header">
            <h1 class="main-title">一切从这里开始！</h1>
            <p class="subtitle">双击卡片即可跳转</p>
        </header>

        <main class="content">
            <div id="sites-grid" class="sites-grid">
                <!-- 卡片由 JS 动态生成 -->
            </div>
        </main>

        <footer class="main-footer">
            <span class="footer-text">© 2026</span>
        </footer>
    </div>

    <script>
        // 前端：只负责展示，所有数据从后端 API 获取
        async function loadSites() {
            try {
                const res = await fetch('/api/sites');
                const data = await res.json();
                renderSites(data.sites || []);
            } catch (e) {
                document.getElementById('sites-grid').innerHTML =
                    '<p class="error">加载失败，请稍后重试。</p>';
            }
        }

        function renderSites(sites) {
            const grid = document.getElementById('sites-grid');
            if (!sites.length) {
                grid.innerHTML = '<p class="empty">暂无网站。</p>';
                return;
            }

            grid.innerHTML = sites.map(site => {
                const iconUrl = site.icon || getFavicon(site.url);
                return `
                    <div class="site-card" data-url="${escapeHtml(site.url)}" title="双击打开：${escapeHtml(site.title)}">
                        <div class="card-icon">
                            <img src="${escapeHtml(iconUrl)}" alt="" onerror="this.style.display='none'; this.parentElement.innerHTML='🌐';">
                        </div>
                        <h3 class="card-title">${escapeHtml(site.title)}</h3>
                        <p class="card-desc">${escapeHtml(site.description || '')}</p>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.site-card').forEach(card => {
                card.addEventListener('dblclick', () => {
                    const url = card.dataset.url;
                    if (url) window.open(url, '_blank');
                });
            });
        }

        function getFavicon(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            } catch {
                return '';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        loadSites();
    </script>
</body>
</html>
