<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="main-header">
            <h1 class="main-title">一切从这里开始！</h1>
            <p class="subtitle">双击卡片即可跳转</p>
        </header>

        <main class="content">
            <div id="sites-grid" class="sites-grid">
                <!-- 卡片由 JS 动态生成 -->
            </div>
        </main>

        <footer class="main-footer">
            <a href="admin.html" class="admin-link">进入后台管理</a>
        </footer>
    </div>

    <script>
        // 加载并渲染网站卡片
        async function loadSites() {
            try {
                // 优先从本地存储读取（如果有缓存）
                const cached = localStorage.getItem('sitesData');
                let data;

                if (cached) {
                    data = JSON.parse(cached);
                } else {
                    const res = await fetch('sites.json?t=' + Date.now());
                    data = await res.json();
                }

                renderSites(data.sites || []);
            } catch (e) {
                document.getElementById('sites-grid').innerHTML =
                    '<p class="error">加载失败，请检查 sites.json 是否存在。</p>';
            }
        }

        function renderSites(sites) {
            const grid = document.getElementById('sites-grid');
            if (!sites.length) {
                grid.innerHTML = '<p class="empty">暂无网站，请进入后台添加。</p>';
                return;
            }

            grid.innerHTML = sites.map(site => {
                // 如果没有图标，尝试用 Google Favicon 服务获取
                const iconUrl = site.icon || getFavicon(site.url);
                return `
                    <div class="site-card" data-url="${escapeHtml(site.url)}" title="双击打开：${escapeHtml(site.title)}">
                        <div class="card-icon">
                            <img src="${escapeHtml(iconUrl)}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>'">
                        </div>
                        <h3 class="card-title">${escapeHtml(site.title)}</h3>
                        <p class="card-desc">${escapeHtml(site.description || '')}</p>
                    </div>
                `;
            }).join('');

            // 绑定双击事件
            document.querySelectorAll('.site-card').forEach(card => {
                card.addEventListener('dblclick', () => {
                    const url = card.dataset.url;
                    if (url) window.open(url, '_blank');
                });
            });
        }

        function getFavicon(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            } catch {
                return '';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadSites();
    </script>
</body>
</html>
